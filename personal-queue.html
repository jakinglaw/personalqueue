<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>My Work Queue — Grist Widget</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  :root {
    --bg:#fff; --panel:#fbfbfa; --ink:#1d2b2a; --ink-soft:#5a6968; --ink-faint:#8a9695;
    --line:#e6e8e6; --line-strong:#d3d7d4; --accent:#1a7f6b; --accent-soft:#e7f3f0;
    --green:#1f9d57; --green-soft:#e8f6ed; --green-mid:#c4e7d1; --green-ink:#15663a;
    --red:#c23b22; --red-soft:#fbecea; --warn:#9a6b12; --warn-soft:#fcf3e2; --today-soft:#fff5e8; --today-line:#e6b366;
    --radius:8px; --shadow:0 1px 2px rgba(20,40,38,.06),0 6px 20px rgba(20,40,38,.07);
    --ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    --display:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  }
  *{box-sizing:border-box;} html,body{margin:0;height:100%;}
  body{font-family:var(--ui);color:var(--ink);background:var(--bg);font-size:13px;line-height:1.45;-webkit-font-smoothing:antialiased;}
  #app{min-height:100vh;}
  .wrap{padding:14px 16px 28px;max-width:720px;margin:0 auto;}
  h1{font-family:var(--display);font-size:22px;margin:2px 0;}
  .sub{color:var(--ink-faint);margin:0 0 12px;}
  .notice{padding:28px;max-width:460px;margin:24px auto;text-align:center;color:var(--ink-soft);}
  .notice h2{font-family:var(--display);color:var(--ink);}

  .controls{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px;}
  .ctl-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);margin:10px 0 5px;}
  .ctl-label:first-child{margin-top:0;}
  .people{display:flex;flex-wrap:wrap;gap:6px;}
  .person{font-size:12px;padding:4px 11px;border-radius:20px;border:1px solid var(--line-strong);background:#fff;color:var(--ink-soft);cursor:pointer;}
  .person.sel{background:var(--accent);color:#fff;border-color:var(--accent);}
  .ctl-row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-top:12px;}
  .seg{display:inline-flex;border:1px solid var(--line-strong);border-radius:var(--radius);overflow:hidden;}
  .seg button{border:0;background:transparent;padding:6px 12px;font:inherit;cursor:pointer;color:var(--ink-soft);border-right:1px solid var(--line-strong);}
  .seg button:last-child{border-right:0;}
  .seg button.active{background:var(--accent);color:#fff;}
  .seg button:not(.active):hover{background:#eef1ef;}
  select.sortsel{font:inherit;padding:6px 8px;border:1px solid var(--line-strong);border-radius:7px;background:#fff;}
  .stepper{display:inline-flex;align-items:center;border:1px solid var(--line-strong);border-radius:var(--radius);overflow:hidden;}
  .countrow{display:flex;gap:8px;align-items:center;}
  .stepper.off{opacity:.4;}
  .stepper button{border:0;background:#fff;width:30px;height:32px;font-size:16px;cursor:pointer;color:var(--ink-soft);}
  .stepper button:hover{background:#eef1ef;} .stepper button[disabled]{opacity:.4;cursor:not-allowed;}
  .stepper .n{min-width:30px;text-align:center;font-variant-numeric:tabular-nums;font-weight:600;}
  .shuffle{border:1px solid var(--line-strong);background:#fff;border-radius:var(--radius);padding:6px 12px;cursor:pointer;font:inherit;color:var(--ink-soft);}
  .shuffle:hover{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
  .field{display:flex;flex-direction:column;}

  .meta{color:var(--ink-faint);font-size:12px;margin:14px 2px 6px;}
  .queue{display:flex;flex-direction:column;gap:10px;}
  .empty{color:var(--ink-faint);font-style:italic;padding:18px;text-align:center;}

  /* task cards + editors (shared look with the calendar) */
  .row{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer;border-left-width:4px;}
  .row:hover{border-color:var(--line-strong);box-shadow:var(--shadow);}
  .row.complete,.row.ready{background:var(--green-mid);}
  .row.critical{background:var(--red-soft);}
  .row .duewrap{position:relative;flex:none;}
  .row .time{font-variant-numeric:tabular-nums;color:var(--ink-soft);font-size:12px;min-width:66px;padding:1px 3px 0 0;border:0;background:transparent;font-family:inherit;text-align:left;cursor:pointer;border-radius:5px;text-decoration:underline dotted;text-decoration-color:var(--line-strong);text-underline-offset:2px;}
  .row .time.editable:hover{color:var(--accent);text-decoration-color:var(--accent);}
  .row .time .pen{font-size:10px;margin-left:3px;opacity:.45;} .row .time.editable:hover .pen{opacity:.9;}
  .row .main{flex:1;min-width:0;}
  .row .topline{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:3px;}
  .row .title{font-weight:600;font-size:13.5px;word-break:break-word;}
  .row .title.done{color:var(--green-ink);}
  .badge{font-size:11px;padding:1px 8px;border-radius:20px;font-weight:600;}
  .badge.over{background:var(--red);color:#fff;}
  .badge.today{background:var(--today-soft);color:#8a5a12;border:1px solid var(--today-line);}
  .badge.up{background:#eef3f1;color:var(--ink-soft);}
  .asgdate{font-size:11.5px;color:var(--ink-faint);margin-top:1px;}
  .row .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .tag{font-size:11px;padding:1px 7px;border-radius:20px;background:#f0f2f0;color:var(--ink-soft);}
  .tag.cat{color:#fff;} .tag.asg::before{content:"@";opacity:.6;margin-right:1px;}
  .tag.proj{background:#eaf0fa;color:#3a5d92;border:1px solid #cdddf2;} .tag.proj::before{content:"\25C8";opacity:.7;margin-right:3px;}
  .tag.recur{background:#eef3f1;color:var(--accent);border:1px solid #cfe5df;}
  .tag.pri{border:1px solid var(--line-strong);background:#fff;} .tag.pri.imp{background:var(--red-soft);border-color:#e6b3a8;color:var(--red);font-weight:600;}
  .tag.editchip{background:#fff;border:1px dashed var(--line-strong);color:var(--ink-faint);cursor:pointer;} .tag.editchip:hover{color:var(--accent);border-color:var(--accent);}
  .row .desc{font-size:12px;color:var(--ink-soft);margin-top:6px;white-space:pre-wrap;overflow-wrap:anywhere;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;}
  .row .desc.full{display:block;-webkit-line-clamp:none;overflow:visible;}
  .descmore{display:none;font-size:11px;color:var(--accent);margin-top:3px;user-select:none;}
  .row.expanded .descmore,.row.truncated .descmore{display:inline-block;}
  .editlink{font-size:11px;color:var(--accent);cursor:pointer;user-select:none;margin-top:4px;display:inline-block;} .editlink:hover{text-decoration:underline;}
  .addnote{font-size:11px;color:var(--ink-faint);cursor:pointer;margin-top:5px;display:inline-block;user-select:none;} .addnote:hover{color:var(--accent);}

  .statuswrap{position:relative;flex:none;margin-left:auto;}
  .statuspill{border:1px solid var(--line-strong);background:#fff;border-radius:20px;padding:3px 11px;font:inherit;font-size:11px;cursor:pointer;color:var(--ink-soft);white-space:nowrap;}
  .statuspill:hover{background:#eef1ef;} .statuspill.is-complete{background:var(--green-soft);border-color:#bfe6cd;color:var(--green-ink);}
  .statuspill .pcaret{color:var(--ink-faint);font-size:9px;margin-left:4px;}
  .statusmenu{position:absolute;top:calc(100% + 4px);right:0;z-index:60;background:#fff;border:1px solid var(--line-strong);border-radius:8px;box-shadow:var(--shadow);min-width:150px;padding:4px;}
  .statusitem{display:block;width:100%;text-align:left;border:0;background:transparent;padding:6px 10px;border-radius:6px;font:inherit;cursor:pointer;color:var(--ink);} .statusitem:hover{background:#f3f5f3;} .statusitem.current{font-weight:600;color:var(--accent);} .statusitem.clear{color:var(--ink-faint);border-top:1px solid var(--line);margin-top:4px;}

  .fieldedit{margin-top:6px;display:flex;flex-direction:column;gap:6px;background:#fff;border:1px solid var(--line-strong);border-radius:8px;padding:8px;}
  .fieldedit textarea{font:inherit;min-height:64px;resize:vertical;border:1px solid var(--line-strong);border-radius:6px;padding:6px;width:100%;box-sizing:border-box;}
  .fe-actions{display:flex;gap:6px;} .fe-actions button{border:1px solid var(--line-strong);border-radius:6px;padding:5px 12px;cursor:pointer;font:inherit;}
  .fe-save{background:var(--accent);color:#fff;border-color:var(--accent)!important;} .fe-save:hover{filter:brightness(1.05);} .fe-cancel{background:#fff;color:var(--ink-soft);} .fe-cancel:hover{background:#eef1ef;}
  .picker{display:flex;flex-wrap:wrap;gap:6px;} .pchip{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--line-strong);background:#fff;color:var(--ink-soft);cursor:pointer;} .pchip.sel{background:var(--accent);color:#fff;border-color:var(--accent);}
  .padd{display:flex;gap:6px;margin-top:6px;} .padd input{flex:1;font:inherit;padding:5px 6px;border:1px solid var(--line-strong);border-radius:6px;min-width:0;} .padd button{border:1px solid var(--line-strong);background:#f6f8f6;border-radius:6px;padding:5px 10px;cursor:pointer;font:inherit;}
  .dateeditor{position:absolute;top:calc(100% + 4px);left:0;z-index:60;background:#fff;border:1px solid var(--line-strong);border-radius:8px;box-shadow:var(--shadow);padding:8px;display:flex;flex-direction:column;gap:6px;min-width:190px;}
  .dateeditor input{font:inherit;padding:5px 6px;border:1px solid var(--line-strong);border-radius:6px;}
  .de-shortcuts{display:flex;flex-wrap:wrap;gap:5px;} .de-shortcuts button{border:1px solid var(--line-strong);background:#f6f8f6;border-radius:20px;padding:3px 10px;font:inherit;font-size:11px;cursor:pointer;color:var(--ink-soft);} .de-shortcuts button:hover{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
  .de-actions{display:flex;gap:6px;} .de-actions button{flex:1;border:1px solid var(--line-strong);border-radius:6px;padding:5px;cursor:pointer;font:inherit;} .de-save{background:var(--accent);color:#fff;border-color:var(--accent)!important;} .de-cancel{background:#fff;color:var(--ink-soft);}
</style>
</head>
<body>
<div id="app"><div class="wrap" id="root"></div></div>
<script>
"use strict";

/* ===================== State ===================== */
const state = {
  haveGrist: typeof grist !== "undefined" && grist && grist.ready,
  records: [], cols: {}, mapped: {},
  dueIsDateTime: false, dueTypeFromMeta: null,
  catMulti: false, catTypeKnown: false, asgMulti: false, asgTypeKnown: false, priIsBool: false, priTypeKnown: false,
  typesChecked: false,
  // queue settings (persisted)
  projects: [], timing: "all", sort: "due", count: 5, limit: true, randSeed: "seed1", resetStatus: "",
  // transient editor state
  openStatusRow: null, openDateRow: null, editingDescRow: null, editingCatRow: null, editingPriRow: null, editingProjRow: null, editingRecRow: null,
  expandedRows: new Set(),
  resetting: new Set(), // recurring tasks currently being auto-reset
};
const COMPLETE_WORDS = new Set(["complete","completed","done","closed","resolved","finished"]);
const CANCEL_WORDS = new Set(["cancelled","canceled","void","withdrawn","dismissed"]);
const READY_WORDS = new Set(["ready"]);
const NO_CAT="(No category)", NO_PROJECT="(No project)";
const PRI_WORDS={"highest":0,"critical":0,"urgent":0,"emergency":0,"p0":0,"high":1,"p1":1,"important":1,"medium":2,"normal":2,"med":2,"moderate":2,"standard":2,"p2":2,"low":3,"p3":3,"lowest":4,"p4":4,"none":5};
const CAT_COLORS=["#1a7f6b","#3a6ea5","#b4452f","#8a5a9c","#a8762a","#2f7d8a","#7a8c2e","#9c4f6b","#4a5d8a","#6b8e23"];
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];

/* ===================== Helpers ===================== */
function el(t,c){const e=document.createElement(t);if(c)e.className=c;return e;}
function opt(v,l,s){const o=document.createElement("option");o.value=v;o.textContent=l;if(s)o.selected=true;return o;}
function pad2(n){return String(n).padStart(2,"0");} function pad4(n){return String(n).padStart(4,"0");}
function iso(d){return pad4(d.getFullYear())+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
function fmtTime(h,m){const ap=h>=12?"PM":"AM";let hh=h%12;if(hh===0)hh=12;return hh+":"+pad2(m)+" "+ap;}
function fmtShortDate(due){let s=MONTHS[due.mo].slice(0,3)+" "+due.d;if(due.y!==(new Date()).getFullYear())s+=", "+due.y;return s;}
function parseDue(v){
  if(v instanceof Date)v=v.getTime()/1000;
  else if(typeof v==="string"&&v.trim()!==""&&!isNaN(Number(v)))v=Number(v);
  if(typeof v!=="number"||!isFinite(v))return null;
  const hasTime=(v%86400!==0);const d=new Date(v*1000);
  if(hasTime){const h=d.getHours(),m=d.getMinutes();return{y:d.getFullYear(),mo:d.getMonth(),d:d.getDate(),minuteOfDay:h*60+m,timed:true,timeStr:(h===0&&m===0)?null:fmtTime(h,m),raw:v};}
  return{y:d.getUTCFullYear(),mo:d.getUTCMonth(),d:d.getUTCDate(),minuteOfDay:-1,timed:false,timeStr:null,raw:v};
}
function toList(v){if(v===null||v===undefined||v==="")return[];if(Array.isArray(v)){const items=v[0]==="L"?v.slice(1):v;return items.filter(x=>x!==null&&x!=="").map(String);}return[String(v)];}
function priorityRank(v){
  if(v===null||v===undefined||v==="")return{num:Infinity,str:""};
  if(v===true)return{num:0,str:""}; if(v===false)return{num:6,str:""};
  if(typeof v==="number")return{num:v,str:""};
  const s=String(v).trim().toLowerCase();
  if(s==="true"||s==="yes"||s==="y")return{num:0,str:s}; if(s==="false"||s==="no"||s==="n")return{num:6,str:s};
  if(s in PRI_WORDS)return{num:PRI_WORDS[s],str:s};
  const n=parseFloat(s); if(!isNaN(n))return{num:n,str:s}; return{num:1000,str:s};
}
function catColor(label){let h=0;for(let i=0;i<label.length;i++)h=(h*31+label.charCodeAt(i))>>>0;return CAT_COLORS[h%CAT_COLORS.length];}
function uniqSorted(a){return Array.from(new Set(a)).sort((x,y)=>x.localeCompare(y));}

function recCats(r){const l=toList(r.category);return l.length?l:[NO_CAT];}
function recProj(r){const l=toList(r.project);return l.length?l:[NO_PROJECT];}
function ymd(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function addCalendarDays(d,n){const x=ymd(d);x.setDate(x.getDate()+n);return x;}
function addMonths(d,n){const x=ymd(d);const day=x.getDate();x.setDate(1);x.setMonth(x.getMonth()+n);const last=new Date(x.getFullYear(),x.getMonth()+1,0).getDate();x.setDate(Math.min(day,last));return x;}
function parseRecurrence(v){
  if(v===null||v===undefined)return null;const s=String(v).trim().toLowerCase();if(!s)return null;
  const m=s.match(/^(\d+)\s*(d|day|days|w|wk|wks|week|weeks|mo|month|months|m|y|yr|year|years)\b/);
  if(!m)return null;const n=parseInt(m[1],10);if(!n||n<1)return null;
  const c=m[2][0];const unit=c==="d"?"day":c==="w"?"week":c==="y"?"year":"month";
  return {n:n,unit:unit};
}
function recStr(n,unit){return n+" "+unit+(n===1?"":"s");}
function fmtRecurrence(rec){return "every "+rec.n+" "+rec.unit+(rec.n===1?"":"s");}
function addInterval(date,rec){
  if(rec.unit==="day")return addCalendarDays(date,rec.n);
  if(rec.unit==="week")return addCalendarDays(date,rec.n*7);
  if(rec.unit==="year")return addMonths(date,rec.n*12);
  return addMonths(date,rec.n);
}
function statusStr(r){return (r.status===null||r.status===undefined)?"":String(r.status).trim().toLowerCase();}
function isComplete(r){return state.mapped.Status&&COMPLETE_WORDS.has(statusStr(r));}
function isReady(r){return state.mapped.Status&&READY_WORDS.has(statusStr(r));}
function isCancelled(r){return state.mapped.Status&&CANCEL_WORDS.has(statusStr(r));}
function isImportant(v){if(v===null||v===undefined||v==="")return false;return priorityRank(v).num<=1;}
function isCritical(r){if(state.mapped.Priority&&isImportant(r.priority))return true;return false;}
function classify(r){if(isComplete(r))return "complete";if(isReady(r))return "ready";if(isCritical(r))return "critical";return "normal";}
function stripeColor(r,kind){
  if(kind==="complete"||kind==="ready")return "var(--green)";
  if(kind==="critical")return "var(--red)";
  const cats=recCats(r);return (state.mapped.Category&&cats[0]!==NO_CAT)?catColor(cats[0]):"var(--accent)";
}

/* timing */
function todayN(){const d=new Date();return d.getFullYear()*10000+d.getMonth()*100+d.getDate();}
function dueN(due){return due.y*10000+due.mo*100+due.d;}
function timingOf(r){const t=todayN(),v=dueN(r.due);if(v<t)return "overdue";if(v===t)return "today";return "upcoming";}
function daysDiff(due){const a=new Date(due.y,due.mo,due.d);const n=new Date();const b=new Date(n.getFullYear(),n.getMonth(),n.getDate());return Math.round((a-b)/86400000);}

/* ===================== Grist read ===================== */
function pick(rec,m,k){const real=m?m[k]:null;if(real===undefined||real===null)return undefined;if(Array.isArray(real))return real.map(c=>rec[c]);return rec[real];}
function ingest(records,mappings){
  mappings=mappings||{};
  state.cols={DueDate:mappings.DueDate||null,Title:mappings.Title||null,Project:mappings.Project||null,AssignedDate:mappings.AssignedDate||null,
    Category:mappings.Category||null,Priority:mappings.Priority||null,Status:mappings.Status||null,Description:mappings.Description||null,Recurrence:mappings.Recurrence||null};
  state.mapped={};Object.keys(state.cols).forEach(k=>state.mapped[k]=!!state.cols[k]);
  const out=[];let anyTimed=false,anyCatList=false,anyPriBool=false;
  (records||[]).forEach(rec=>{
    const due=parseDue(pick(rec,mappings,"DueDate"));
    const asgRaw=state.mapped.AssignedDate?pick(rec,mappings,"AssignedDate"):undefined;
    const asgDate=parseDue(asgRaw);
    const dv=pick(rec,mappings,"DueDate");
    if(typeof dv==="number"&&dv%86400!==0)anyTimed=true;
    if(state.mapped.Category&&Array.isArray(pick(rec,mappings,"Category")))anyCatList=true;
    if(state.mapped.Priority&&typeof pick(rec,mappings,"Priority")==="boolean")anyPriBool=true;
    out.push({id:rec.id,due:due,
      assignedRaw:(typeof asgRaw==="number")?asgRaw:(asgDate?asgDate.raw:null),assignedDate:asgDate,
      title:pick(rec,mappings,"Title"),
      project:state.mapped.Project?pick(rec,mappings,"Project"):null,
      category:state.mapped.Category?pick(rec,mappings,"Category"):null,
      priority:state.mapped.Priority?pick(rec,mappings,"Priority"):null,
      status:state.mapped.Status?pick(rec,mappings,"Status"):null,
      description:state.mapped.Description?pick(rec,mappings,"Description"):null,
      recurrence:state.mapped.Recurrence?pick(rec,mappings,"Recurrence"):null});
  });
  state.records=out;
  if(state.dueTypeFromMeta===null)state.dueIsDateTime=out.some(r=>r.due&&r.due.timed);
  if(!state.catTypeKnown)state.catMulti=anyCatList;
  if(!state.priTypeKnown)state.priIsBool=anyPriBool;
}
async function detectColumnTypes(){
  try{
    const tableId=await grist.selectedTable.getTableId();
    const tables=await grist.docApi.fetchTable("_grist_Tables");let ref=null;
    for(let i=0;i<tables.id.length;i++)if(tables.tableId[i]===tableId){ref=tables.id[i];break;}
    const cols=await grist.docApi.fetchTable("_grist_Tables_column");
    const typeOf=(colId)=>{if(!colId)return null;for(let i=0;i<cols.id.length;i++)if(cols.colId[i]===colId&&(ref===null||cols.parentId[i]===ref))return String(cols.type[i]||"");return null;};
    const isList=t=>t.indexOf("ChoiceList")===0||t.indexOf("RefList")===0;
    const dt=typeOf(state.cols.DueDate);if(dt!==null){state.dueTypeFromMeta=dt.indexOf("DateTime")===0;state.dueIsDateTime=state.dueTypeFromMeta;}
    const ct=typeOf(state.cols.Category);if(ct!==null){state.catMulti=isList(ct);state.catTypeKnown=true;}
    const pt=typeOf(state.cols.Priority);if(pt!==null){state.priIsBool=pt==="Bool";state.priTypeKnown=true;}
    render();
  }catch(e){}
}

/* ===================== Grist write ===================== */
function selectInGrist(rowId){try{grist.setCursorPos({rowId});}catch(e){}}
async function writeField(rowId,colId,value,label){
  if(!colId)return;const fields={};fields[colId]=value;
  try{await grist.selectedTable.update({id:rowId,fields:fields});}
  catch(e){try{const tid=await grist.selectedTable.getTableId();await grist.docApi.applyUserActions([["UpdateRecord",tid,rowId,fields]]);}
  catch(e2){console.error(e2);alert("Could not update "+label+". The widget needs full (read & write) access.");}}
}
function encodeMulti(arr,multi){if(!arr||!arr.length)return null;return multi?["L"].concat(arr):arr[0];}
function encodeDue(dateStr,timeStr){const p=dateStr.split("-").map(Number);const Y=p[0],M=p[1],D=p[2];
  if(state.dueIsDateTime){let h=9,mi=0;if(timeStr){const t=timeStr.split(":").map(Number);h=t[0];mi=t[1];}return new Date(Y,M-1,D,h,mi,0,0).getTime()/1000;}
  return Date.UTC(Y,M-1,D)/1000;}

/* When a recurring task is marked complete, push its due date out by the recurrence period and re-activate it. */
function encodeDateObj(d){if(state.dueIsDateTime)return new Date(d.getFullYear(),d.getMonth(),d.getDate(),0,0,0,0).getTime()/1000;return Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())/1000;}
function autoResetRecurring(){
  if(!state.haveGrist||!state.mapped.Recurrence||!state.mapped.Status||!state.mapped.DueDate)return;
  const today=new Date();
  state.records.forEach(r=>{
    const rec=parseRecurrence(r.recurrence);
    if(!rec||!isComplete(r)||state.resetting.has(r.id))return;
    state.resetting.add(r.id);

    const fields={};fields[state.cols.DueDate]=encodeDateObj(next);fields[state.cols.Status]=state.resetStatus||null;

/* ===================== Queue logic ===================== */
function isDoneOrCancelled(r){return isComplete(r)||isCancelled(r);}
function eligible(r){
  if(!r.due)return false;                                  // unplaceable -> not in queue
  if(isDoneOrCancelled(r))return false;                    // finished/cancelled drop out
  if(state.projects.length){const p=recProj(r);if(!p.some(x=>state.projects.indexOf(x)>=0))return false;}
  const t=timingOf(r);
  if(state.timing==="overdue"&&t!=="overdue")return false;
  if(state.timing==="upcoming"&&t==="overdue")return false; // upcoming includes today
  return true;
}
function hashf(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}return (h>>>0)/4294967296;}
function randKey(id){return hashf(state.randSeed+":"+id);}
function assignedVal(r){return (typeof r.assignedRaw==="number")?r.assignedRaw:-Infinity;}
function sortQueue(list){
  const arr=list.slice();
  if(state.sort==="due")arr.sort((a,b)=>dueN(a.due)-dueN(b.due)||String(a.title).localeCompare(String(b.title)));
  else if(state.sort==="assigned-new")arr.sort((a,b)=>assignedVal(b)-assignedVal(a));
  else if(state.sort==="assigned-old")arr.sort((a,b)=>{const av=assignedVal(a),bv=assignedVal(b);return (av===-Infinity?Infinity:av)-(bv===-Infinity?Infinity:bv);});
  else if(state.sort==="random")arr.sort((a,b)=>randKey(a.id)-randKey(b.id));
  return arr;
}
function queueList(){return sortQueue(state.records.filter(eligible));}

  const has=r.priority!==null&&r.priority!==undefined&&r.priority!=="";
  const known=uniqSorted([].concat.apply([],state.records.map(rr=>{const v=rr.priority;return (v===null||v===undefined||v==="")?[]:[String(v)];})));
  const p=buildTagPicker(has?[String(r.priority)]:[],false,known,"priority");ed.appendChild(p.element);
  ed.appendChild(feActions(()=>{state.editingPriRow=null;setPriority(r.id,p.get());render();},()=>{state.editingPriRow=null;render();}));return ed;
}
function descEditor(r){
  const ed=fieldEditShell();const ta=document.createElement("textarea");ta.value=(r.description!==null&&r.description!==undefined)?String(r.description):"";ta.placeholder="Add a note\u2026";ed.appendChild(ta);
  ed.appendChild(feActions(()=>{state.editingDescRow=null;setDescription(r.id,ta.value);render();},()=>{state.editingDescRow=null;render();}));return ed;
}
function feActions(onSave,onCancel){const a=el("div","fe-actions");const s=el("button","fe-save");s.textContent="Save";s.onclick=onSave;const c=el("button","fe-cancel");c.textContent="Cancel";c.onclick=onCancel;a.append(s,c);return a;}

document.addEventListener("click",()=>{let ch=false;if(state.openStatusRow!==null){state.openStatusRow=null;ch=true;}if(state.openDateRow!==null){state.openDateRow=null;ch=true;}if(ch)render();});

/* adjust desc clamp affordance */
function adjustClamps(){document.querySelectorAll(".row").forEach(row=>{const d=row.querySelector(".desc:not(.full)");if(d&&d.scrollHeight-d.clientHeight>2)row.classList.add("truncated");});}
const _origRender=render;
render=function(){_origRender();adjustClamps();};

/* ===================== Init ===================== */
if(state.haveGrist){
  grist.ready({requiredAccess:"full",columns:[
    {name:"DueDate",title:"Due Date",type:"Date,DateTime"},
    {name:"Title",title:"Title",type:"Any"},
    {name:"Project",title:"Project",type:"Choice,Text",optional:true,description:"The project each task belongs to \u2014 used for the project filter and editable per task."},
    {name:"Recurrence",title:"Recurrence",type:"Text",optional:true,description:"e.g. \"2 weeks\". A completed recurring task auto-reopens this far in the future. Requires Status."},
    {name:"AssignedDate",title:"Assigned Date",type:"Date,DateTime",optional:true,description:"When the task was assigned \u2014 enables the 'sort by assigned date' option."},
    {name:"Status",title:"Status",type:"Choice,Text",optional:true,description:"Complete/cancelled tasks drop out of the queue; needed for recurring resets."},
    {name:"Category",title:"Category",type:"Choice,ChoiceList,Text",optional:true},
    {name:"Priority",title:"Priority",type:"Any",optional:true},
    {name:"Description",title:"Description",type:"Text,Any",optional:true},
  ]});
  grist.onOptions((o)=>{o=o||{};
    if(Array.isArray(o.projects))state.projects=o.projects;
    if(o.timing)state.timing=o.timing;
    if(o.sort)state.sort=o.sort;
    if(typeof o.count==="number")state.count=Math.max(1,Math.min(10,o.count));
    if(typeof o.limit==="boolean")state.limit=o.limit;
    if(o.randSeed)state.randSeed=o.randSeed;
    if(typeof o.resetStatus==="string")state.resetStatus=o.resetStatus;
    render();
  });
  grist.onRecords((records,mappings)=>{ingest(records,mappings);autoResetRecurring();render();if(!state.typesChecked&&state.cols.DueDate){state.typesChecked=true;detectColumnTypes();}});
}
render();
</script>
</body>
