<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>My Work Queue — Grist Widget</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  :root {
    --bg:#fff; --panel:#fbfbfa; --ink:#1d2b2a; --ink-soft:#5a6968; --ink-faint:#8a9695;
    --line:#e6e8e6; --line-strong:#d3d7d4; --accent:#1a7f6b; --accent-soft:#e7f3f0;
    --green:#1f9d57; --green-soft:#e8f6ed; --green-mid:#c4e7d1; --green-ink:#15663a;
    --red:#c23b22; --red-soft:#fbecea; --warn:#9a6b12; --warn-soft:#fcf3e2; --today-soft:#fff5e8; --today-line:#e6b366;
    --radius:8px; --shadow:0 1px 2px rgba(20,40,38,.06),0 6px 20px rgba(20,40,38,.07);
    --ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    --display:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  }
  *{box-sizing:border-box;} html,body{margin:0;height:100%;}
  body{font-family:var(--ui);color:var(--ink);background:var(--bg);font-size:13px;line-height:1.45;-webkit-font-smoothing:antialiased;}
  #app{min-height:100vh;}
  .wrap{padding:14px 16px 28px;max-width:940px;margin:0 auto;}
  h1{font-family:var(--display);font-size:22px;margin:2px 0;}
  .sub{color:var(--ink-faint);margin:0 0 12px;}
  .notice{padding:28px;max-width:460px;margin:24px auto;text-align:center;color:var(--ink-soft);}
  .notice h2{font-family:var(--display);color:var(--ink);}

  .controls{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px;}
  .clearbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 10px;margin-bottom:10px;background:var(--accent-soft);border:1px solid #cfe5df;border-radius:7px;}
  .clearbar-txt{font-size:12px;color:var(--accent);font-weight:500;}
  .clearlink{border:0;background:transparent;color:var(--accent);font:inherit;font-size:12px;font-weight:600;cursor:pointer;text-decoration:underline;padding:2px 4px;white-space:nowrap;}
  .clearlink:hover{color:var(--ink);}
  .ctl-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);margin:10px 0 5px;}
  .ctl-label:first-child{margin-top:0;}
  .people{display:flex;flex-wrap:wrap;gap:6px;}
  .person{font-size:12px;padding:4px 11px;border-radius:20px;border:1px solid var(--line-strong);background:#fff;color:var(--ink-soft);cursor:pointer;}
  .person.sel{background:var(--accent);color:#fff;border-color:var(--accent);}
  .ctl-row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-top:12px;}
  .seg{display:inline-flex;border:1px solid var(--line-strong);border-radius:var(--radius);overflow:hidden;}
  .seg button{border:0;background:transparent;padding:6px 12px;font:inherit;cursor:pointer;color:var(--ink-soft);border-right:1px solid var(--line-strong);}
  .seg button:last-child{border-right:0;}
  .seg button.active{background:var(--accent);color:#fff;}
  .seg button:not(.active):hover{background:#eef1ef;}
  select.sortsel{font:inherit;padding:6px 8px;border:1px solid var(--line-strong);border-radius:7px;background:#fff;}
  .stepper{display:inline-flex;align-items:center;border:1px solid var(--line-strong);border-radius:var(--radius);overflow:hidden;}
  .countrow{display:flex;gap:8px;align-items:center;}
  .stepper.off{opacity:.4;}
  .stepper button{border:0;background:#fff;width:30px;height:32px;font-size:16px;cursor:pointer;color:var(--ink-soft);}
  .stepper button:hover{background:#eef1ef;} .stepper button[disabled]{opacity:.4;cursor:not-allowed;}
  .stepper .n{min-width:30px;text-align:center;font-variant-numeric:tabular-nums;font-weight:600;}
  .shuffle{border:1px solid var(--line-strong);background:#fff;border-radius:var(--radius);padding:6px 12px;cursor:pointer;font:inherit;color:var(--ink-soft);}
  .shuffle:hover{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
  .upwindow-row{display:flex;align-items:center;gap:7px;margin-top:7px;}
  .upwindow-label{font-size:12px;color:var(--ink-soft);white-space:nowrap;}
  .field{display:flex;flex-direction:column;}

  .meta{color:var(--ink-faint);font-size:12px;margin:14px 2px 6px;}

  /* --- stats strip --- */
  .stats{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 12px;}
  .stat{font:inherit;font-size:11.5px;color:var(--ink-soft);background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:3px 11px;cursor:pointer;transition:transform .06s,box-shadow .12s;}
  .stat b{color:var(--ink);font-variant-numeric:tabular-nums;}
  .stat:hover:not(:disabled){border-color:var(--accent);box-shadow:0 1px 4px rgba(20,40,38,.10);}
  .stat:active:not(:disabled){transform:translateY(1px);}
  .stat:disabled{cursor:default;opacity:.55;}
  .stat.stat-warn{background:var(--warn-soft);border-color:#e6d0a0;color:#7a5410;} .stat.stat-warn b{color:#7a5410;}
  .stat.stat-crit{background:#fbe3de;border-color:#e8b4a8;color:#8f2c15;} .stat.stat-crit b{color:#8f2c15;}
  /* active view */
  .stat.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;box-shadow:0 1px 5px rgba(26,127,107,.32);}
  .stat.on b{color:#fff;}
  .stat.on.stat-warn{background:#9a6b12;border-color:#9a6b12;} .stat.on.stat-warn b{color:#fff;}
  .stat.on.stat-crit{background:#8f2c15;border-color:#8f2c15;color:#fff;} .stat.on.stat-crit b{color:#fff;}
  .stat.on::after{content:" \2715";opacity:.75;font-size:10px;}

  /* --- search --- */
  .searchwrap{position:relative;margin-bottom:10px;}
  .searchinput{width:100%;font:inherit;padding:8px 30px 8px 11px;border:1px solid var(--line-strong);border-radius:8px;background:#fff;}
  .searchinput:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .searchclear{position:absolute;right:6px;top:50%;transform:translateY(-50%);border:0;background:transparent;color:var(--ink-faint);cursor:pointer;font-size:13px;padding:3px 5px;border-radius:5px;}
  .searchclear:hover{background:#eef1ef;color:var(--ink);}

  /* --- bulk bar --- */
  .bulkbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;background:var(--accent);color:#fff;border-radius:8px;padding:8px 12px;margin:10px 0;
           position:sticky;top:var(--headh,0px);z-index:44;box-shadow:0 3px 12px -4px rgba(26,127,107,.5);}
  .bulk-count{font-size:12px;font-weight:600;white-space:nowrap;}
  .bulk-acts{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .bulkbtn{border:1px solid rgba(255,255,255,.5);background:rgba(255,255,255,.14);color:#fff;border-radius:6px;padding:4px 10px;font:inherit;font-size:12px;cursor:pointer;white-space:nowrap;}
  .bulkbtn:hover{background:rgba(255,255,255,.28);}
  .bulkbtn.bulk-danger{background:rgba(0,0,0,.18);border-color:rgba(255,255,255,.35);}
  .bulkbtn.bulk-danger:hover{background:var(--red);border-color:var(--red);}
  .bulkbtn.bulk-plain{background:transparent;border-color:rgba(255,255,255,.35);}
  .bulksel{font:inherit;font-size:12px;padding:4px 6px;border-radius:6px;border:1px solid rgba(255,255,255,.5);background:rgba(255,255,255,.14);color:#fff;cursor:pointer;}
  .bulksel option{color:var(--ink);}

  /* --- row checkbox --- */
  .cbwrap{flex:none;padding-top:2px;}
  .rowcb{cursor:pointer;width:15px;height:15px;accent-color:var(--accent);}

  /* --- graduated overdue intensity --- */
  .row.od1{border-left-color:#e8a87c!important;background:#fff9f5;}
  .row.od2{border-left-color:#dd7f52!important;background:#fdf0e8;}
  .row.od3{border-left-color:var(--red)!important;background:#fbe8e3;}
  .row.od4{border-left-color:#8f2c15!important;background:#f8ddd6;border-left-width:6px;box-shadow:inset 3px 0 0 rgba(143,44,21,.25);}
  .row.pinned{border-color:#e0a99b;}
  .badge.over.od1{background:#e8a87c;color:#5c3418;}
  .badge.over.od2{background:#dd7f52;color:#fff;}
  .badge.over.od3{background:var(--red);color:#fff;}
  .badge.over.od4{background:#8f2c15;color:#fff;letter-spacing:.04em;font-weight:700;}
  .badge.pin{background:#fff;color:#8f2c15;border:1px solid #e0a99b;font-weight:600;}

  /* --- days to complete / runway --- */
  .dtc{display:block;margin-top:3px;font-size:10.5px;font-variant-numeric:tabular-nums;border:1px dashed var(--line-strong);background:#fff;color:var(--ink-soft);border-radius:5px;padding:1px 5px;cursor:pointer;white-space:nowrap;font-family:inherit;width:100%;text-align:left;}
  .dtc:hover{border-color:var(--accent);color:var(--accent);border-style:solid;}
  .dtc.unset{color:var(--ink-faint);opacity:.7;}
  .dtc.atrisk{background:var(--warn-soft);border-color:#e6d0a0;border-style:solid;color:#7a5410;font-weight:600;}
  .runway{margin-top:2px;font-size:10px;font-variant-numeric:tabular-nums;white-space:nowrap;padding-left:2px;}
  .runway.ok{color:var(--ink-faint);}
  .runway.tight{color:#7a5410;font-weight:600;}
  .runway.short{color:var(--red);font-weight:700;}
  .runway.over{color:var(--red);font-weight:600;}
  .dtc-hd{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);}
  .dateeditor input[type=number]{font:inherit;padding:5px 6px;border:1px solid var(--line-strong);border-radius:6px;}
  .badge.risk{background:var(--warn-soft);color:#7a5410;border:1px solid #e6d0a0;font-weight:600;}

  /* --- undo toast --- */
  .toast{position:sticky;bottom:12px;display:flex;align-items:center;gap:10px;margin:14px auto 0;max-width:440px;
         background:var(--ink);color:#fff;border-radius:9px;padding:9px 12px;box-shadow:0 4px 18px rgba(20,40,38,.28);z-index:80;}
  .toast-txt{flex:1;font-size:12.5px;}
  .toast-undo{border:1px solid rgba(255,255,255,.55);background:transparent;color:#fff;border-radius:6px;padding:4px 12px;font:inherit;font-size:12px;font-weight:600;cursor:pointer;}
  .toast-undo:hover{background:rgba(255,255,255,.18);}
  .toast-x{border:0;background:transparent;color:rgba(255,255,255,.65);cursor:pointer;font-size:12px;padding:2px 4px;}
  .toast-x:hover{color:#fff;}

  /* --- duplicate --- */
  .dupbtn{flex:none;border:0;background:transparent;color:var(--ink-faint);font-size:14px;padding:4px 6px;cursor:pointer;border-radius:6px;opacity:.45;line-height:1;}
  .dupbtn:hover{background:var(--accent-soft);color:var(--accent);opacity:1;}

  /* --- sticky header: stats + search + filters pin together --- */
  .stickyhead{position:sticky;top:0;z-index:45;background:var(--bg);
              padding-top:6px;margin:0 -16px;padding-left:16px;padding-right:16px;
              border-bottom:1px solid transparent;transition:border-color .15s,box-shadow .15s;}
  .stickyhead.stuck{border-bottom-color:var(--line);box-shadow:0 4px 12px -6px rgba(20,40,38,.18);}
  .stickyhead .stats{margin-top:0;}
  .stickyhead.collapsed .searchwrap,
  .stickyhead.collapsed .controls{display:none;}
  .headtoggle{display:flex;justify-content:flex-end;margin:-2px 0 6px;}
  .headtoggle button{border:0;background:transparent;color:var(--ink-faint);font:inherit;font-size:11px;cursor:pointer;padding:2px 6px;border-radius:5px;}
  .headtoggle button:hover{background:var(--panel);color:var(--accent);}

  /* --- actionable empty state --- */
  .empty-acts{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:10px;}

  /* --- focus-visible (a11y) --- */
  button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  /* --- ongoing (no due date) --- */
  .badge.ongoing{background:#eef1f4;color:#5b6b7a;border:1px solid #d5dde4;font-weight:600;}
  .row.ongoing-row{border-left-color:#a9b6c2!important;}
  .de-none{border:1px solid var(--line-strong);background:#fff;border-radius:6px;padding:6px 8px;cursor:pointer;font:inherit;font-size:11.5px;color:var(--ink-soft);width:100%;text-align:center;}
  .de-none:hover{background:#eef1f4;border-color:#a9b6c2;color:#42505c;}
  .de-none.on{background:#eef1f4;border-color:#a9b6c2;color:#42505c;font-weight:600;}
  .nodue-lab{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--ink-soft);text-transform:none;letter-spacing:0;min-width:0;cursor:pointer;white-space:nowrap;}
  .nodue-lab input{cursor:pointer;accent-color:var(--accent);}

  /* --- unified edit panel --- */
  .editbtn{flex:none;border:0;background:transparent;color:var(--ink-faint);font-size:14px;padding:4px 6px;cursor:pointer;border-radius:6px;opacity:.5;line-height:1;}
  .editbtn:hover{background:var(--accent-soft);color:var(--accent);opacity:1;}
  .editbtn.on{background:var(--accent);color:#fff;opacity:1;}
  .editpanel{margin-top:8px;background:#fff;border:1px solid var(--line-strong);border-radius:9px;padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
  .ep-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .ep-row label{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);min-width:64px;flex:none;}
  .ep-in{font:inherit;font-size:12.5px;padding:5px 8px;border:1px solid var(--line-strong);border-radius:6px;flex:1;min-width:0;background:#fff;}
  .ep-in:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft);}
  .ep-in:disabled{background:#f3f5f3;color:var(--ink-faint);}
  .ep-sm{flex:none;width:120px;}
  .ep-ta{flex:1 1 100%;min-height:56px;resize:vertical;}
  .ep-add{flex:1 1 100%;margin-top:4px;}
  .ep-hint{font-size:11px;color:var(--ink-faint);}
  .ep-quick{display:flex;gap:4px;}
  .ep-quick button{border:1px solid var(--line-strong);background:#f6f8f6;border-radius:20px;padding:2px 8px;font:inherit;font-size:10.5px;cursor:pointer;color:var(--ink-soft);}
  .ep-quick button:hover{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
  .ep-check{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--ink-soft);text-transform:none;letter-spacing:0;min-width:0;cursor:pointer;white-space:nowrap;}
  .ep-check input{cursor:pointer;accent-color:var(--accent);}
  .ep-chips{display:flex;flex-wrap:wrap;gap:5px;flex:1;}
  .ep-actions{display:flex;gap:6px;margin-top:2px;padding-top:8px;border-top:1px solid var(--line);}
  .ep-actions button{border:1px solid var(--line-strong);border-radius:6px;padding:6px 16px;cursor:pointer;font:inherit;font-size:12.5px;}

  /* --- keyboard focus --- */
  .row.kfocus{outline:2px solid var(--accent);outline-offset:1px;}

  /* --- snooze --- */
  .snoozewrap{position:relative;flex:none;}
  .snoozebtn{border:0;background:transparent;color:var(--ink-faint);font-size:14px;padding:4px 6px;cursor:pointer;border-radius:6px;opacity:.5;line-height:1;}
  .snoozebtn:hover{background:var(--accent-soft);color:var(--accent);opacity:1;}
  .snoozemenu{position:absolute;top:calc(100% + 4px);right:0;z-index:60;background:#fff;border:1px solid var(--line-strong);border-radius:8px;box-shadow:var(--shadow);min-width:140px;padding:4px;}

  /* --- shuffle --- */
  .shuffle.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .shuffle:disabled{opacity:.4;cursor:not-allowed;}
  .shuffle-off{border:1px solid var(--line-strong);background:#fff;border-radius:var(--radius);padding:6px 9px;cursor:pointer;font:inherit;color:var(--ink-faint);}
  .shuffle-off:hover{background:var(--red-soft);color:var(--red);border-color:var(--red);}

  /* --- help --- */
  .hkbtn{border:1px solid var(--line-strong);background:#fff;color:var(--ink-soft);border-radius:50%;width:26px;height:26px;font:inherit;font-weight:600;cursor:pointer;line-height:1;}
  .hkbtn:hover{border-color:var(--accent);color:var(--accent);}
  /* --- two-column body: list + hotkey rail --- */
  .body{display:grid;grid-template-columns:1fr 190px;gap:16px;align-items:start;}
  .body.railclosed{grid-template-columns:1fr 30px;}
  .listcol{min-width:0;}

  .rail{position:sticky;top:calc(var(--headh,0px) + 8px);display:flex;gap:6px;align-items:flex-start;}
  .rail.closed{justify-content:flex-end;}
  .railtab{flex:none;border:1px solid var(--line-strong);background:#fff;color:var(--ink-faint);border-radius:7px;
           width:26px;height:26px;font:inherit;font-size:13px;line-height:1;cursor:pointer;padding:0;}
  .railtab:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
  .railbody{flex:1;min-width:0;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px;}
  .railhd{font-family:var(--display);font-size:14px;color:var(--ink);margin-bottom:8px;}
  .railgrp{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);margin:9px 0 4px;}
  .railgrp:first-of-type{margin-top:0;}
  .railgrid{display:grid;grid-template-columns:auto 1fr;gap:4px 8px;align-items:center;}
  .railgrid kbd{background:#fff;border:1px solid var(--line-strong);border-bottom-width:2px;border-radius:4px;
                padding:1px 6px;font:inherit;font-size:10.5px;font-weight:600;color:var(--ink);white-space:nowrap;text-align:center;min-width:16px;}
  .railgrid span{font-size:11.5px;color:var(--ink-soft);line-height:1.3;}
  .railnote{margin-top:10px;padding-top:8px;border-top:1px solid var(--line);font-size:10.5px;color:var(--ink-faint);line-height:1.35;}

  /* narrow viewports: drop the rail below the list */
  @media (max-width:760px){
    .body,.body.railclosed{grid-template-columns:1fr;}
    .rail{position:static;margin-top:12px;}
  }
  .head{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .head-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .demobadge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--warn-soft);color:var(--warn);border:1px solid #e6d0a0;letter-spacing:.03em;white-space:nowrap;}
  .newbtn{border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:var(--radius);padding:7px 14px;font:inherit;cursor:pointer;white-space:nowrap;}
  .newbtn:hover{filter:brightness(1.05);}
  .newform{margin-bottom:12px;}
  .nrow{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap;}
  .nrow label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);min-width:74px;}
  .nrow span{font-size:12px;color:var(--ink-faint);}
  .ntf{font:inherit;padding:6px 8px;border:1px solid var(--line-strong);border-radius:6px;min-width:0;flex:1;}
  .ntf.small{flex:none;width:120px;}
  .nform-actions{display:flex;gap:8px;margin-top:14px;}
  .nform-actions button{border:1px solid var(--line-strong);border-radius:6px;padding:7px 14px;cursor:pointer;font:inherit;}
  .queue{display:flex;flex-direction:column;gap:10px;}
  .empty{color:var(--ink-faint);font-style:italic;padding:18px;text-align:center;}

  /* task cards + editors (shared look with the calendar) */
  .row{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer;border-left-width:4px;}
  .row:hover{border-color:var(--line-strong);box-shadow:var(--shadow);}
  .row.complete,.row.ready{background:var(--green-mid);}
  .row.critical{background:var(--red-soft);}
  .row .duewrap{position:relative;flex:none;}
  .row .time{font-variant-numeric:tabular-nums;color:var(--ink-soft);font-size:12px;min-width:66px;padding:1px 3px 0 0;border:0;background:transparent;font-family:inherit;text-align:left;cursor:pointer;border-radius:5px;text-decoration:underline dotted;text-decoration-color:var(--line-strong);text-underline-offset:2px;}
  .row .time.editable:hover{color:var(--accent);text-decoration-color:var(--accent);}
  .row .time.nodate{color:var(--warn);text-decoration-color:var(--warn);}
  .row .time .pen{font-size:10px;margin-left:3px;opacity:.45;} .row .time.editable:hover .pen{opacity:.9;}
  .row .main{flex:1;min-width:0;}
  .row .topline{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:3px;}
  .row .title{font-weight:600;font-size:13.5px;word-break:break-word;}
  .row .title.done{color:var(--green-ink);}
  .badge{font-size:11px;padding:1px 8px;border-radius:20px;font-weight:600;}
  .badge.over{background:var(--red);color:#fff;}
  .badge.today{background:var(--today-soft);color:#8a5a12;border:1px solid var(--today-line);}
  .badge.up{background:#eef3f1;color:var(--ink-soft);}
  .asgdate{font-size:11.5px;color:var(--ink-faint);margin-top:1px;}
  .row .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}

<body>
<div id="app"><div class="wrap" id="root"></div></div>
<script>
"use strict";

/* ===================== State ===================== */
const state = {
  haveGrist: typeof grist !== "undefined" && grist && grist.ready,
  records: [], cols: {}, mapped: {},
  dueIsDateTime: false, dueTypeFromMeta: null,
  catMulti: false, catTypeKnown: false, asgMulti: false, asgTypeKnown: false, priIsBool: false, priTypeKnown: false,
  choiceStatus: [], choiceCategory: [], choiceProject: [],  // canonical lists from Grist column metadata
  typesChecked: false,
  // queue settings (persisted)
  projects: [], categories: [], timing: "all", sort: "due", count: 5, limit: true, randSeed: "seed1", upWindow: 0,
  search: "", shuffled: false, railOpen: true, statView: null, headCollapsed: false,
  selected: new Set(),          // bulk-action selection
  focusIdx: -1,                 // keyboard cursor
  // transient editor state
  openStatusRow: null, openDateRow: null, openSnoozeRow: null, openDtcRow: null, editingRow: null,
  expandedRows: new Set(),
  creating: false, newDraft: null,            // "New task" form
  undo: null, undoTimer: null,                // undo toast
  prevComplete: {}, snapshotReady: false, spawning: new Set(), // recurrence: spawn on open->complete transition
};
const COMPLETE_WORDS = new Set(["complete","completed","done","closed","resolved","finished"]);
const CANCEL_WORDS = new Set(["cancelled","canceled","void","withdrawn","dismissed"]);
const READY_WORDS = new Set(["ready"]);
const NO_CAT="(No category)", NO_PROJECT="(No project)";
const PRIORITIES=["High","Medium","Low"];              // fixed set — no additions
const PRI_RANK={"high":0,"medium":1,"med":1,"normal":1,"low":2};
function normPriority(v){
  if(v===null||v===undefined||v==="")return null;
  if(v===true)return "High"; if(v===false)return null;   // tolerate a legacy Bool column
  const s=String(v).trim().toLowerCase();
  if(s==="")return null;
  if(s==="high"||s==="highest"||s==="urgent"||s==="critical"||s==="important"||s==="p0"||s==="p1"||s==="1")return "High";
  if(s==="medium"||s==="med"||s==="normal"||s==="moderate"||s==="standard"||s==="p2"||s==="2")return "Medium";
  if(s==="low"||s==="lowest"||s==="p3"||s==="p4"||s==="3")return "Low";
  return null;                                            // anything else is treated as unset
}
function priorityRank(v){const p=normPriority(v);return p===null?Infinity:PRI_RANK[p.toLowerCase()];}
const CAT_COLORS=["#1a7f6b","#3a6ea5","#b4452f","#8a5a9c","#a8762a","#2f7d8a","#7a8c2e","#9c4f6b","#4a5d8a","#6b8e23"];
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];

/* ===================== Helpers ===================== */
function el(t,c){const e=document.createElement(t);if(c)e.className=c;return e;}
function opt(v,l,s){const o=document.createElement("option");o.value=v;o.textContent=l;if(s)o.selected=true;return o;}
function pad2(n){return String(n).padStart(2,"0");} function pad4(n){return String(n).padStart(4,"0");}
function iso(d){return pad4(d.getFullYear())+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
function fmtTime(h,m){const ap=h>=12?"PM":"AM";let hh=h%12;if(hh===0)hh=12;return hh+":"+pad2(m)+" "+ap;}
function fmtShortDate(due){let s=MONTHS[due.mo].slice(0,3)+" "+due.d;if(due.y!==(new Date()).getFullYear())s+=", "+due.y;return s;}
function parseDue(v){
  if(v instanceof Date)v=v.getTime()/1000;
  else if(typeof v==="string"&&v.trim()!==""&&!isNaN(Number(v)))v=Number(v);
  if(typeof v!=="number"||!isFinite(v))return null;
  const hasTime=(v%86400!==0);const d=new Date(v*1000);
  if(hasTime){const h=d.getHours(),m=d.getMinutes();return{y:d.getFullYear(),mo:d.getMonth(),d:d.getDate(),minuteOfDay:h*60+m,timed:true,timeStr:(h===0&&m===0)?null:fmtTime(h,m),raw:v};}
  return{y:d.getUTCFullYear(),mo:d.getUTCMonth(),d:d.getUTCDate(),minuteOfDay:-1,timed:false,timeStr:null,raw:v};
}
function toList(v){if(v===null||v===undefined||v==="")return[];if(Array.isArray(v)){const items=v[0]==="L"?v.slice(1):v;return items.filter(x=>x!==null&&x!=="").map(String);}return[String(v)];}
function catColor(label){let h=0;for(let i=0;i<label.length;i++)h=(h*31+label.charCodeAt(i))>>>0;return CAT_COLORS[h%CAT_COLORS.length];}
function uniqSorted(a){return Array.from(new Set(a)).sort((x,y)=>x.localeCompare(y));}

function recCats(r){const l=toList(r.category);return l.length?l:[NO_CAT];}
function recProj(r){const l=toList(r.project);return l.length?l:[NO_PROJECT];}
function ymd(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function addCalendarDays(d,n){const x=ymd(d);x.setDate(x.getDate()+n);return x;}
function parseRecurDays(v){
  if(v===null||v===undefined)return null;
  if(typeof v==="number")return (isFinite(v)&&v>=1)?Math.round(v):null;
  const m=String(v).match(/(\d+)/);if(!m)return null;const n=parseInt(m[1],10);return (n>=1)?n:null;
}
function fmtRecurDays(n){return "every "+n+" day"+(n===1?"":"s");}
function statusStr(r){return (r.status===null||r.status===undefined)?"":String(r.status).trim().toLowerCase();}
function isComplete(r){return state.mapped.Status&&COMPLETE_WORDS.has(statusStr(r));}
function isReady(r){return state.mapped.Status&&READY_WORDS.has(statusStr(r));}
function isCancelled(r){return state.mapped.Status&&CANCEL_WORDS.has(statusStr(r));}
function isImportant(v){return normPriority(v)==="High";}
function isCritical(r){if(state.mapped.Priority&&isImportant(r.priority))return true;return false;}
function classify(r){if(isComplete(r))return "complete";if(isReady(r))return "ready";if(isCritical(r))return "critical";return "normal";}
function stripeColor(r,kind){
  if(kind==="complete"||kind==="ready")return "var(--green)";
  if(kind==="critical")return "var(--red)";
  const cats=recCats(r);return (state.mapped.Category&&cats[0]!==NO_CAT)?catColor(cats[0]):"var(--accent)";
}

/* timing */
function todayN(){const d=new Date();return d.getFullYear()*10000+d.getMonth()*100+d.getDate();}
function dueN(due){return due.y*10000+due.mo*100+due.d;}
/* ---- Undated tasks ----
   A task with no due date is an ONGOING task: something to track, but never
   something that should pull attention away from a real deadline. It is never
   overdue, never pinned, never "at risk", and carries the lowest possible
   selection weight. It has no timing classification at all. */
function isUndated(r){return !r.due;}
function todayDue(){const n=new Date();return{y:n.getFullYear(),mo:n.getMonth(),d:n.getDate(),minuteOfDay:-1,timed:false,timeStr:null,raw:null};}
function timingOf(r){
  if(isUndated(r))return "ongoing";                 // its own bucket, not "today"
  const t=todayN(),v=dueN(r.due);
  if(v<t)return "overdue";
  if(v===t)return "today";
  return "upcoming";
}
/* Days until due. null for undated tasks — there is nothing to count down to. */
function daysDiff(r){
  if(isUndated(r))return null;
  const due=r.due;
  const a=new Date(due.y,due.mo,due.d);const n=new Date();
  const b=new Date(n.getFullYear(),n.getMonth(),n.getDate());
  return Math.round((a-b)/86400000);
}

/* ===================== Grist read ===================== */
function pick(rec,m,k){const real=m?m[k]:null;if(real===undefined||real===null)return undefined;if(Array.isArray(real))return real.map(c=>rec[c]);return rec[real];}
function ingest(records,mappings){
  mappings=mappings||{};
  state.cols={DueDate:mappings.DueDate||null,Title:mappings.Title||null,Project:mappings.Project||null,AssignedDate:mappings.AssignedDate||null,
    Category:mappings.Category||null,Priority:mappings.Priority||null,Status:mappings.Status||null,Description:mappings.Description||null,Recurrence:mappings.Recurrence||null,DaysToComplete:mappings.DaysToComplete||null,CompletedDate:mappings.CompletedDate||null};
  state.mapped={};Object.keys(state.cols).forEach(k=>state.mapped[k]=!!state.cols[k]);
  const out=[];let anyTimed=false,anyCatList=false,anyPriBool=false;
  (records||[]).forEach(rec=>{
    const due=parseDue(pick(rec,mappings,"DueDate"));
    const asgRaw=state.mapped.AssignedDate?pick(rec,mappings,"AssignedDate"):undefined;
    const asgDate=parseDue(asgRaw);
    const dv=pick(rec,mappings,"DueDate");
    if(typeof dv==="number"&&dv%86400!==0)anyTimed=true;
    if(state.mapped.Category&&Array.isArray(pick(rec,mappings,"Category")))anyCatList=true;
    out.push({id:rec.id,due:due,
      assignedRaw:(typeof asgRaw==="number")?asgRaw:(asgDate?asgDate.raw:null),assignedDate:asgDate,
      title:pick(rec,mappings,"Title"),
      project:state.mapped.Project?pick(rec,mappings,"Project"):null,
      category:state.mapped.Category?pick(rec,mappings,"Category"):null,
      priority:state.mapped.Priority?pick(rec,mappings,"Priority"):null,
      status:state.mapped.Status?pick(rec,mappings,"Status"):null,
      description:state.mapped.Description?pick(rec,mappings,"Description"):null,
      recurrence:state.mapped.Recurrence?pick(rec,mappings,"Recurrence"):null,
      daysToComplete:state.mapped.DaysToComplete?pick(rec,mappings,"DaysToComplete"):null,
      completedDate:state.mapped.CompletedDate?parseDue(pick(rec,mappings,"CompletedDate")):null});
  });
  state.records=out;
  if(state.dueTypeFromMeta===null)state.dueIsDateTime=out.some(r=>r.due&&r.due.timed);
  if(!state.catTypeKnown)state.catMulti=anyCatList;
  if(!state.priTypeKnown)state.priIsBool=anyPriBool;
}
async function detectColumnTypes(){
  try{
    const tableId=await grist.selectedTable.getTableId();
    const tables=await grist.docApi.fetchTable("_grist_Tables");let ref=null;
    for(let i=0;i<tables.id.length;i++)if(tables.tableId[i]===tableId){ref=tables.id[i];break;}
    const cols=await grist.docApi.fetchTable("_grist_Tables_column");
    const typeOf=(colId)=>{if(!colId)return null;for(let i=0;i<cols.id.length;i++)if(cols.colId[i]===colId&&(ref===null||cols.parentId[i]===ref))return String(cols.type[i]||"");return null;};
    const choicesOf=(colId)=>{
      if(!colId)return[];
      for(let i=0;i<cols.id.length;i++){
        if(cols.colId[i]===colId&&(ref===null||cols.parentId[i]===ref)){
          try{const wo=JSON.parse(cols.widgetOptions[i]||"{}");if(Array.isArray(wo.choices)&&wo.choices.length)return wo.choices.map(String);}catch(e){}
          break;
        }
      }
      return[];
    };
    const isList=t=>t.indexOf("ChoiceList")===0||t.indexOf("RefList")===0;
    const dt=typeOf(state.cols.DueDate);if(dt!==null){state.dueTypeFromMeta=dt.indexOf("DateTime")===0;state.dueIsDateTime=state.dueTypeFromMeta;}
    const ct=typeOf(state.cols.Category);if(ct!==null){state.catMulti=isList(ct);state.catTypeKnown=true;}
    // pull canonical choice lists
    const sc=choicesOf(state.cols.Status);if(sc.length)state.choiceStatus=sc;
    const cc=choicesOf(state.cols.Category);if(cc.length)state.choiceCategory=cc;
    const pc=choicesOf(state.cols.Project);if(pc.length)state.choiceProject=pc;
    render();
  }catch(e){}
}

/* ===================== Grist write ===================== */
function selectInGrist(rowId){try{grist.setCursorPos({rowId});}catch(e){}}
async function writeField(rowId,colId,value,label){
  if(!colId)return;const fields={};fields[colId]=value;
  try{await grist.selectedTable.update({id:rowId,fields:fields});}
  catch(e){try{const tid=await grist.selectedTable.getTableId();await grist.docApi.applyUserActions([["UpdateRecord",tid,rowId,fields]]);}
  catch(e2){console.error(e2);alert("Could not update "+label+". The widget needs full (read & write) access.");}}
}
function encodeMulti(arr,multi){if(!arr||!arr.length)return null;return multi?["L"].concat(arr):arr[0];}
function encodeDue(dateStr,timeStr){const p=dateStr.split("-").map(Number);const Y=p[0],M=p[1],D=p[2];
  if(state.dueIsDateTime){let h=9,mi=0;if(timeStr){const t=timeStr.split(":").map(Number);h=t[0];mi=t[1];}return new Date(Y,M-1,D,h,mi,0,0).getTime()/1000;}
  return Date.UTC(Y,M-1,D)/1000;}
function setStatus(id,v){if(state.mapped.Status)writeField(id,state.cols.Status,v,"status");}
function setDue(id,ts){if(state.mapped.DueDate)writeField(id,state.cols.DueDate,ts,"due date");}
function setDescription(id,t){if(state.mapped.Description)writeField(id,state.cols.Description,(t&&t.trim()!=="")?t:null,"description");}
function setProject(id,arr){if(state.mapped.Project)writeField(id,state.cols.Project,(arr&&arr.length)?arr[0]:null,"project");}
function setTitle(id,v){if(state.cols.Title&&v&&v.trim())writeField(id,state.cols.Title,v.trim(),"title");}
function setDaysToComplete(id,n){if(state.mapped.DaysToComplete)writeField(id,state.cols.DaysToComplete,(typeof n==="number"&&n>=0)?n:null,"days to complete");}
function setRecurrence(id,n){if(state.mapped.Recurrence)writeField(id,state.cols.Recurrence,(typeof n==="number"&&n>=1)?n:null,"recurrence");}
function setCategory(id,arr){if(state.mapped.Category)writeField(id,state.cols.Category,encodeMulti(arr,state.catMulti),"category");}
function setPriority(id,v){if(!state.mapped.Priority)return;writeField(id,state.cols.Priority,(v&&PRIORITIES.indexOf(v)>=0)?v:null,"priority");}

function persist(){if(!state.haveGrist)return;try{grist.setOptions({projects:state.projects,categories:state.categories,timing:state.timing,sort:state.sort,count:state.count,limit:state.limit,randSeed:state.randSeed,upWindow:state.upWindow,shuffled:state.shuffled,statView:state.statView,headCollapsed:state.headCollapsed,railOpen:state.railOpen});}catch(e){}}

function encodeDateObj(d){if(state.dueIsDateTime)return new Date(d.getFullYear(),d.getMonth(),d.getDate(),0,0,0,0).getTime()/1000;return Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())/1000;}
async function createTask(fields){
  try{return await grist.selectedTable.create({fields:fields});}
  catch(e){try{const tid=await grist.selectedTable.getTableId();return await grist.docApi.applyUserActions([["AddRecord",tid,null,fields]]);}
  catch(e2){console.error(e2);alert("Could not create the task. The widget needs full (read & write) access.");}}
}
/* Recurrence: only when a task transitions open -> complete, spawn one identical task N days out. */
function processRecurrence(){
  if(!state.haveGrist){return;}
  const ready=state.snapshotReady, canSpawn=state.mapped.Recurrence&&state.mapped.DueDate&&state.mapped.Status;
  const today=new Date();
  if(ready&&canSpawn){
    state.records.forEach(r=>{
      const days=parseRecurDays(r.recurrence);
      if(!days)return;
      const doneNow=isComplete(r);
      const wasOpen=state.prevComplete[r.id]===false;   // was explicitly open last we saw it
      if(doneNow&&wasOpen&&!state.spawning.has(r.id)){
        state.spawning.add(r.id);
        const fields={};
        fields[state.cols.DueDate]=encodeDateObj(addCalendarDays(today,days));
        if(state.cols.Title)fields[state.cols.Title]=r.title;
        if(state.cols.Project&&r.project!==null&&r.project!==undefined)fields[state.cols.Project]=r.project;
        if(state.cols.Category&&r.category!==null&&r.category!==undefined)fields[state.cols.Category]=r.category;
        if(state.cols.Priority&&r.priority!==null&&r.priority!==undefined)fields[state.cols.Priority]=r.priority;
        if(state.cols.Description&&r.description!==null&&r.description!==undefined)fields[state.cols.Description]=r.description;
        if(state.cols.Recurrence)fields[state.cols.Recurrence]=days;                 // carry recurrence forward
        if(state.cols.DaysToComplete&&r.daysToComplete!==null&&r.daysToComplete!==undefined)fields[state.cols.DaysToComplete]=r.daysToComplete;
        if(state.cols.AssignedDate)fields[state.cols.AssignedDate]=encodeDateObj(today);
        // Status intentionally omitted -> the new task starts active
        Promise.resolve(createTask(fields)).catch(()=>{}).then(()=>{state.spawning.delete(r.id);});
      }
    });
  }
  // Stamp CompletedDate on any task that just transitioned open -> complete,
  // and clear it if a task is re-opened. Independent of recurrence.
  if(ready&&state.mapped.CompletedDate&&state.mapped.Status){
    const today=new Date();
    state.records.forEach(r=>{
      const doneNow=isComplete(r);
      const wasOpen=state.prevComplete[r.id]===false;
      const wasDone=state.prevComplete[r.id]===true;
      if(doneNow&&wasOpen&&!r.completedDate){
        writeField(r.id,state.cols.CompletedDate,encodeDateObj(today),"completed date");
      }else if(!doneNow&&wasDone&&r.completedDate){
        writeField(r.id,state.cols.CompletedDate,null,"completed date");
      }
    });
  }
  // refresh snapshot of which tasks are complete (used to detect the next transition)
  const snap={};state.records.forEach(r=>{snap[r.id]=isComplete(r);});
  state.prevComplete=snap;state.snapshotReady=true;
}

/* ===================== Queue logic ===================== */
function isDoneOrCancelled(r){return isComplete(r)||isCancelled(r);}
function matchesSearch(r){
  const q=(state.search||"").trim().toLowerCase();
  if(!q)return true;
  const hay=[r.title,r.description,toList(r.project).join(" "),toList(r.category).join(" ")].filter(v=>v!==null&&v!==undefined).join(" ").toLowerCase();
  return q.split(/\s+/).every(term=>hay.indexOf(term)>=0);
}
function eligible(r){
  const view=statViewActive();
  // Project / category / search always apply, in every view.
  if(!matchesSearch(r))return false;
  if(state.projects.length){const p=recProj(r);if(!p.some(x=>state.projects.indexOf(x)>=0))return false;}
  if(state.categories.length){const c=recCats(r);if(!c.some(x=>state.categories.indexOf(x)>=0))return false;}
  if(view)return view.match(r);          // a stat view replaces the done/timing rules
  if(isDoneOrCancelled(r))return false;
  // A critically overdue task is never hidden by a timing filter. Pinning is absolute:
  // it would be worse than useless to promise a task can't be missed and then let
  // "Upcoming, due within 14 days" quietly drop a 91-day-late filing.
  if(isPinned(r))return true;
  const t=timingOf(r);
  if(state.timing==="ongoing")return t==="ongoing";   // undated only
  if(state.timing==="overdue")return t==="overdue";
  if(state.timing==="upcoming"){
    if(t==="ongoing")return false;                    // undated has no deadline to be "upcoming"
    if(t==="overdue")return false;
    if(state.upWindow>0){
      const d=daysDiff(r);                            // never null here: t is today/upcoming
      if(d>state.upWindow)return false;
    }
    return true;
  }
  return true;                                        // "all" — includes ongoing
}
function hashf(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}return (h>>>0)/4294967296;}
function randKey(id){return hashf(state.randSeed+":"+id);}

/* ---- Overdue intensity (graduated) ----
   tier 0 = not overdue; 1 = 1-6d; 2 = 7-29d; 3 = 30-59d (severe);
   4 = 60d+ (critical -> PINNED, always shown, never shuffled out). */
/* ---- Days to complete / at-risk model ----
   A task is AT RISK when the work it needs (daysToComplete) is >= the days
   remaining before its deadline: you cannot finish it in the time left.
   Urgency bands, highest preference first:
     3 = overdue (incl. critical/pinned)
     2 = at risk  (daysToComplete >= days remaining)
     1 = comfortable (enough runway, or no real deadline) */
function daysToComplete(r){
  const v=r.daysToComplete;
  if(v===null||v===undefined||v==="")return null;
  const n=Number(v);
  return (isFinite(n)&&n>=0)?n:null;
}
function hasRealDeadline(r){return !!r.due;}          // no due date -> no runway pressure
function daysRemaining(r){return daysDiff(r);}        // null when undated; negative once overdue
function isAtRisk(r){
  const need=daysToComplete(r);
  if(need===null)return false;
  if(!hasRealDeadline(r))return false;                // undated: no deadline to be at risk against
  const left=daysRemaining(r);
  if(left<0)return false;                             // already overdue -> handled by band 3
  return need>=left;                                  // cannot finish in the time left
}
/* Urgency bands, highest first:
     3 = overdue     2 = at risk     1 = comfortable (has a deadline, has runway)
     0 = ongoing     (no due date — tracked, but never allowed to compete) */
function urgencyBand(r){
  if(isUndated(r))return 0;
  if(timingOf(r)==="overdue")return 3;
  if(isAtRisk(r))return 2;
  return 1;
}
/* Slack: days of runway left after the work is done. Negative = short by that many days. */
function slackDays(r){
  const need=daysToComplete(r);
  if(need===null||!hasRealDeadline(r))return null;
  return daysRemaining(r)-need;
}

const PIN_TIER=4;
function overdueDays(r){
  if(isUndated(r))return 0;                           // undated is never overdue
  const d=daysDiff(r);
  return (d!==null&&d<0)?Math.abs(d):0;
}
function overdueTier(r){
  if(isUndated(r))return 0;
  const d=overdueDays(r);
  if(d<=0)return 0;
  if(d<7)return 1;
  if(d<30)return 2;
  if(d<60)return 3;
  return 4;
}
function isPinned(r){return !isUndated(r)&&overdueTier(r)>=PIN_TIER;}
/* Selection weight: higher = likelier to surface in a shuffle.
   Band dominates (overdue > at-risk > comfortable > ongoing). An undated task
   carries the floor weight: it stays visible, but never outranks real work. */
function shuffleWeight(r){
  const band=urgencyBand(r);
  let w;
  if(band===0){
    return 0.25;                                 // ongoing: floor. Priority does NOT boost it.
  }else if(band===3){
    w=[0,8,14,22,40][overdueTier(r)];            // overdue: escalates with depth
  }else if(band===2){
    const s=slackDays(r);                        // 0 or negative
    const shortBy=(s===null)?0:Math.max(0,-s);
    w=4+Math.min(shortBy,10)*0.4;                // 4.0 -> 8.0 as it falls further behind
  }else{
    w=1;
  }
  if(isImportant(r.priority))w*=1.6;            // High priority leans in
  return w;
}
/* Weighted, seeded, without-replacement pick of n items. Pinned items always included first. */
function weightedPick(list,n,seed){
  const pinned=list.filter(isPinned);
  const rest=list.filter(r=>!isPinned(r));
  const out=pinned.slice(0,n);                 // pinned never shuffle out
  let remaining=n-out.length;
  if(remaining<=0)return out;
  const pool=rest.map(r=>({r:r,w:shuffleWeight(r)}));
  while(remaining>0&&pool.length){
    let total=0;for(const p of pool)total+=p.w;
    // seeded draw, varied per pick index
    const roll=hashf(seed+":"+remaining+":"+pool.length)*total;
    let acc=0,idx=0;
    for(let i=0;i<pool.length;i++){acc+=pool[i].w;if(roll<=acc){idx=i;break;}idx=i;}
    out.push(pool[idx].r);
    pool.splice(idx,1);
    remaining--;
  }
  return out;
}
function assignedVal(r){return (typeof r.assignedRaw==="number")?r.assignedRaw:-Infinity;}
/* Sort key for due date. Undated tasks sort to the very end — they have no
   deadline to be ordered by, and shouldn't sit above dated work. */
function dueSortKey(r){return isUndated(r)?Infinity:dueN(r.due);}
function sortQueue(list){
  const arr=list.slice();
  if(state.sort==="due")arr.sort((a,b)=>dueSortKey(a)-dueSortKey(b)||String(a.title).localeCompare(String(b.title)));
  else if(state.sort==="assigned-new")arr.sort((a,b)=>assignedVal(b)-assignedVal(a));
  else if(state.sort==="assigned-old")arr.sort((a,b)=>{const av=assignedVal(a),bv=assignedVal(b);return (av===-Infinity?Infinity:av)-(bv===-Infinity?Infinity:bv);});
  else if(state.sort==="overdue")arr.sort((a,b)=>overdueTier(b)-overdueTier(a)||overdueDays(b)-overdueDays(a)||dueSortKey(a)-dueSortKey(b));
  else if(state.sort==="risk")arr.sort((a,b)=>urgencyBand(b)-urgencyBand(a)||shuffleWeight(b)-shuffleWeight(a)||dueSortKey(a)-dueSortKey(b));
  else if(state.sort==="random")arr.sort((a,b)=>randKey(a.id)-randKey(b.id));
  return arr;
}
/* All eligible tasks, in display order. */
function queueList(){return sortQueue(state.records.filter(eligible));}
/* Which tasks are actually shown: when shuffled, a weighted pick (pinned always in);
   otherwise the first N of the sorted list. Sort always governs display order. */
function shownList(all){
  if(statViewActive())return all;        // a stat view shows every matching task
  if(!state.limit)return all;
  if(state.shuffled){
    const picked=weightedPick(all,state.count,state.randSeed);
    const ids=new Set(picked.map(r=>r.id));
    return all.filter(r=>ids.has(r.id));   // keep sort order
  }
  // not shuffled: still guarantee pinned (critically overdue) tasks are never hidden
  const head=all.slice(0,state.count);
  const ids=new Set(head.map(r=>r.id));
  const missedPins=all.filter(r=>isPinned(r)&&!ids.has(r.id));
  if(!missedPins.length)return head;
  const merged=new Set(head.concat(missedPins).map(r=>r.id));
  return all.filter(r=>merged.has(r.id));
}

/* ---- Stats strip (utility 6) ---- */
/* Sticky-header shadow: only show the divider once the page is actually scrolled. */
function attachStickyWatch(){
  if(state._stickyWatch)return;
  state._stickyWatch=true;
  const onScroll=()=>{
    const h=document.getElementById("stickyhead");
    if(!h)return;
    // In Grist the widget is an iframe; the scroll container may be the window,
    // the document element, or #app. Take whichever reports movement.
    const app=document.getElementById("app");
    const y=Math.max(
      window.scrollY||0,
      document.documentElement?document.documentElement.scrollTop||0:0,
      document.body?document.body.scrollTop||0:0,
      app?app.scrollTop||0:0
    );
    h.classList.toggle("stuck",y>2);
  };
  window.addEventListener("scroll",onScroll,{passive:true});
  const app=document.getElementById("app");
  if(app)app.addEventListener("scroll",onScroll,{passive:true});
  onScroll();
}
/* Publish the sticky header's height so the bulk bar can pin just below it. */
function syncHeadHeight(){
  const h=document.getElementById("stickyhead");
  if(!h)return;
  const px=Math.round(h.getBoundingClientRect().height);
  document.documentElement.style.setProperty("--headh",px+"px");
}

/* ===================== Undo ===================== */
/* Snapshot prior values before a destructive action, then offer a timed toast.
   Covers: delete (single + bulk), bulk complete, snooze/date changes, status changes. */
const UNDO_MS=12000;
function rawFieldsOf(r){
  // reconstruct the raw column values for a record, so we can restore it verbatim
  const f={};
  const put=(key,val)=>{const col=state.cols[key];if(col&&val!==undefined)f[col]=val;};
  put("Title",r.title);
  put("DueDate",r.due?r.due.raw:null);
  put("Project",r.project);
  put("Category",r.category);
  put("Priority",r.priority);
  put("Status",r.status);
  put("Description",r.description);
  put("Recurrence",r.recurrence);
  put("DaysToComplete",r.daysToComplete);
  put("AssignedDate",r.assignedRaw);
  return f;
}
function pushUndo(label,undoFn){
  state.undo={label:label,fn:undoFn,at:Date.now()};
  if(state.undoTimer)clearTimeout(state.undoTimer);
  state.undoTimer=setTimeout(()=>{state.undo=null;state.undoTimer=null;render();},UNDO_MS);
  render();
}
async function runUndo(){
  const u=state.undo;
  if(!u)return;
  state.undo=null;
  if(state.undoTimer){clearTimeout(state.undoTimer);state.undoTimer=null;}
  render();
  try{await u.fn();}catch(e){console.error("undo failed:",e);alert("Could not undo that.");}
}
/* Undo helpers for specific actions */
function undoableFieldChange(ids,label){
  // capture current values of the given rows, return a restore fn
  const snaps=ids.map(id=>{const r=state.records.find(x=>x.id===id);return r?{id:id,fields:rawFieldsOf(r)}:null;}).filter(Boolean);
  return ()=>Promise.all(snaps.map(s=>restoreFields(s.id,s.fields)));
}
async function restoreFields(rowId,fields){
  try{await grist.selectedTable.update({id:rowId,fields:fields});}
  catch(e){try{const tid=await grist.selectedTable.getTableId();await grist.docApi.applyUserActions([["UpdateRecord",tid,rowId,fields]]);}catch(e2){console.error(e2);}}
}
async function recreateRecords(snaps){
  // snaps: [{fields}] — recreate deleted rows (new ids, same content)
  for(const s of snaps){await createTask(s.fields);}
}
function undoToast(){
  const t=el("div","toast");
  t.appendChild(Object.assign(el("span","toast-txt"),{textContent:state.undo.label}));
  const b=el("button","toast-undo");b.textContent="Undo";b.onclick=runUndo;
  t.appendChild(b);
  const x=el("button","toast-x");x.textContent="\u2715";x.title="Dismiss";
  x.onclick=()=>{state.undo=null;if(state.undoTimer){clearTimeout(state.undoTimer);state.undoTimer=null;}render();};
  t.appendChild(x);
  return t;
}

/* ---- Stat views: clicking a stat filters the queue to just those tasks ----
   These are view overrides: they replace the timing filter and show every match
   (no Top-N cap), while still honoring project / category / search filters. */
const STAT_VIEWS={
  open:      {label:"open",      match:r=>!isDoneOrCancelled(r)},
  overdue:   {label:"overdue",   match:r=>!isDoneOrCancelled(r)&&timingOf(r)==="overdue"},
  critical:  {label:"critical",  match:r=>!isDoneOrCancelled(r)&&isPinned(r)},
  atrisk:    {label:"at risk",   match:r=>!isDoneOrCancelled(r)&&isAtRisk(r)},
  ongoing:   {label:"ongoing",   match:r=>!isDoneOrCancelled(r)&&isUndated(r)},
  oldest:    {label:"oldest overdue", match:r=>{
                if(isDoneOrCancelled(r))return false;
                const open=state.records.filter(x=>!isDoneOrCancelled(x));
                let mx=0;open.forEach(x=>{const d=overdueDays(x);if(d>mx)mx=d;});
                return mx>0&&overdueDays(r)===mx;}},
  completed: {label:"completed", match:r=>{
                if(!isComplete(r))return false;
                if(!state.mapped.CompletedDate)return true;
                const cut=addCalendarDays(new Date(),-30);
                const cutN=cut.getFullYear()*10000+cut.getMonth()*100+cut.getDate();
                return r.completedDate&&dueN(r.completedDate)>=cutN;}},
};
function statViewActive(){return state.statView&&STAT_VIEWS[state.statView];}
function setStatView(key){
  state.statView=(state.statView===key)?null:key;
  state.selected.clear();state.focusIdx=-1;
  persist();render();
}
function statsStrip(){
  const s=el("div","stats");
  const open=state.records.filter(r=>!isDoneOrCancelled(r));
  const overdue=open.filter(r=>timingOf(r)==="overdue");
  const crit=open.filter(isPinned);
  let oldest=0;open.forEach(r=>{const d=overdueDays(r);if(d>oldest)oldest=d;});
  const completedAll=state.records.filter(r=>isComplete(r));
  let doneRecent=completedAll.length, doneLabel="completed";
  if(state.mapped.CompletedDate){
    const cut=addCalendarDays(new Date(),-30);
    const cutN=cut.getFullYear()*10000+cut.getMonth()*100+cut.getDate();
    doneRecent=completedAll.filter(r=>r.completedDate&&dueN(r.completedDate)>=cutN).length;
    doneLabel="completed (30d)";
  }
  const add=(key,label,val,cls)=>{
    const active=state.statView===key;
    const b=el("button","stat"+(cls?" "+cls:"")+(active?" on":""));
    b.appendChild(Object.assign(el("b"),{textContent:String(val)}));
    b.appendChild(Object.assign(el("span"),{textContent:" "+label}));
    b.title=active?"Click to clear this view":("Show all "+label+" tasks");
    b.setAttribute("aria-pressed",active?"true":"false");
    b.disabled=(val===0&&key!=="open");
    b.onclick=()=>setStatView(key);
    s.appendChild(b);
  };
  add("open","open",open.length);
  add("overdue","overdue",overdue.length,overdue.length?"stat-warn":"");
  if(crit.length)add("critical","critical",crit.length,"stat-crit");
  if(state.mapped.DaysToComplete){const atr=open.filter(isAtRisk);if(atr.length)add("atrisk","at risk",atr.length,"stat-warn");}
  {const ong=open.filter(isUndated);if(ong.length)add("ongoing","ongoing",ong.length);}
  add("oldest",oldest===1?"day oldest overdue":"days oldest overdue",oldest,oldest>=60?"stat-crit":(oldest>=30?"stat-warn":""));
  add("completed",doneLabel,doneRecent);
  return s;
}

/* ---- Search (utility 4) ---- */
function searchBox(){
  const w=el("div","searchwrap");
  const i=document.createElement("input");i.type="text";i.className="searchinput";i.id="qsearch";
  i.placeholder="Search title, note, project, category\u2026  ( / )";
  i.value=state.search;
  i.oninput=()=>{state.search=i.value;state.selected.clear();renderKeepFocus("qsearch");};
  w.appendChild(i);
  if(state.search){const x=el("button","searchclear");x.textContent="\u2715";x.title="Clear search";
    x.onclick=()=>{state.search="";render();};w.appendChild(x);}

}
/* re-render but restore focus+caret to a given input id */
function renderKeepFocus(id){
  const prev=document.getElementById(id);
  const pos=prev?prev.selectionStart:null;
  render();
  const next=document.getElementById(id);
  if(next){next.focus();if(pos!==null){try{next.setSelectionRange(pos,pos);}catch(e){}}}
}

/* ---- Snooze ---- */
function snoozeTask(r,days){
  const base=new Date();                       // snooze is relative to today, not the old due date
  const restore=undoableFieldChange([r.id]);
  setDue(r.id,encodeDateObj(addCalendarDays(base,days)));
  pushUndo("Snoozed \u201c"+(r.title||"task")+"\u201d "+days+"d",restore);
}
function nextMondayDays(){const n=new Date();const dow=n.getDay();return ((8-dow)%7)||7;}

/* ---- Bulk actions ---- */
function bulkBar(shown){
  const b=el("div","bulkbar");
  const n=state.selected.size;
  b.appendChild(Object.assign(el("span","bulk-count"),{textContent:n+" selected"}));
  const acts=el("div","bulk-acts");
  const mk=(label,fn,cls)=>{const x=el("button","bulkbtn"+(cls?" "+cls:""));x.textContent=label;x.onclick=fn;acts.appendChild(x);};
  const ids=()=>Array.from(state.selected);
  const plural=(k)=>k+" task"+(k===1?"":"s");
  if(state.mapped.Status){
    const completeVal=(statusOptions().find(s=>COMPLETE_WORDS.has(String(s).toLowerCase())))||"Complete";
    mk("\u2713 Complete",()=>{const list=ids();const k=list.length;const restore=undoableFieldChange(list);
      list.forEach(id=>setStatus(id,completeVal));state.selected.clear();
      pushUndo("Completed "+plural(k),restore);});
  }
  const bulkSnooze=(label,daysFn)=>mk(label,()=>{const list=ids();const k=list.length;const restore=undoableFieldChange(list);
    const d=daysFn();const base=new Date();
    list.forEach(id=>{const r=state.records.find(x=>x.id===id);if(r)setDue(id,encodeDateObj(addCalendarDays(base,d)));});
    state.selected.clear();pushUndo("Snoozed "+plural(k)+" "+d+"d",restore);});
  bulkSnooze("+1d",()=>1);
  bulkSnooze("+7d",()=>7);
  bulkSnooze("Next Mon",nextMondayDays);
  if(state.mapped.Project){
    const psel=document.createElement("select");psel.className="bulksel";
    psel.appendChild(opt("","Set project\u2026",true));
    knownProjects().forEach(p=>psel.appendChild(opt(p,p,false)));
    psel.onchange=()=>{const v=psel.value;if(!v)return;const list=ids();const k=list.length;const restore=undoableFieldChange(list);
      list.forEach(id=>setProject(id,[v]));state.selected.clear();
      pushUndo("Moved "+plural(k)+" to \u201c"+v+"\u201d",restore);};
    acts.appendChild(psel);
  }
  mk("\u{1F5D1} Delete",async()=>{
    const list=ids();const k=list.length;
    if(!confirm("Delete "+plural(k)+"?"))return;
    const snaps=list.map(id=>{const r=state.records.find(x=>x.id===id);return r?{fields:rawFieldsOf(r)}:null;}).filter(Boolean);
    state.selected.clear();
    for(const id of list)await bulkDelete(id);
    pushUndo("Deleted "+plural(k),()=>recreateRecords(snaps));
  },"bulk-danger");
  mk("Cancel",()=>{state.selected.clear();render();},"bulk-plain");
  b.appendChild(acts);
  return b;
}
async function bulkDelete(rowId){
  try{await grist.selectedTable.destroy(rowId);}
  catch(e){try{const tid=await grist.selectedTable.getTableId();await grist.docApi.applyUserActions([["RemoveRecord",tid,rowId]]);}catch(e2){console.error(e2);}}
}

/* ---- Keyboard shortcuts (utility 3) ---- */
function typingInField(e){
  const t=e.target;if(!t)return false;
  const tag=(t.tagName||"").toLowerCase();
  return tag==="input"||tag==="textarea"||tag==="select"||t.isContentEditable;
}
document.addEventListener("keydown",(e)=>{
  if(!state.haveGrist&&!state.demoMode)return;
  // "/" focuses search even from anywhere except a field
  if(e.key==="/"&&!typingInField(e)){e.preventDefault();const s=document.getElementById("qsearch");if(s)s.focus();return;}
  if(typingInField(e)){
    if(e.key==="Escape"){e.target.blur();clearTransient();render();}
    return;
  }
  const all=queueList();const shown=shownList(all);
  if(!shown.length&&e.key!=="n"&&e.key!=="N")return;
  const cur=()=>shown[state.focusIdx];
  const move=(d)=>{let i=state.focusIdx+d;if(i<0)i=0;if(i>shown.length-1)i=shown.length-1;state.focusIdx=i;render();
    const node=document.querySelector('.row.kfocus');if(node&&node.scrollIntoView)node.scrollIntoView({block:"nearest"});};
  switch(e.key){
    case "j": case "ArrowDown": e.preventDefault();if(state.focusIdx<0)state.focusIdx=0;else move(1);if(state.focusIdx===0)render();break;
    case "k": case "ArrowUp": e.preventDefault();if(state.focusIdx<0)state.focusIdx=0;move(-1);break;
    case "c": case "C": {const r=cur();if(!r||!state.mapped.Status)break;e.preventDefault();
      const v=(statusOptions().find(s=>COMPLETE_WORDS.has(String(s).toLowerCase())))||"Complete";
      const restore=undoableFieldChange([r.id]);setStatus(r.id,v);
      pushUndo("Completed \u201c"+(r.title||"task")+"\u201d",restore);break;}
    case "e": case "E": {const r=cur();if(!r)break;e.preventDefault();state.expandedRows.add(r.id);openInlineEditor("title",r.id);break;}
    case "s": case "S": {const r=cur();if(!r)break;e.preventDefault();snoozeTask(r,1);break;}
    case "x": case "X": {const r=cur();if(!r)break;e.preventDefault();
      if(state.selected.has(r.id))state.selected.delete(r.id);else state.selected.add(r.id);render();break;}
    case "d": case "D": {const r=cur();if(!r)break;e.preventDefault();duplicateTask(r);break;}
    case "n": case "N": e.preventDefault();state.creating=true;state.newDraft=null;render();break;
    case "Escape": state.focusIdx=-1;state.selected.clear();clearTransient();render();break;
    case "?": e.preventDefault();state.railOpen=!state.railOpen;persist();render();break;
    case "z": case "Z": if((e.metaKey||e.ctrlKey)&&state.undo){e.preventDefault();runUndo();}break;
  }
});
/* Side legend: a persistent, collapsible hotkey reference beside the list. */
const HOTKEY_GROUPS=[
  {title:"Move",  keys:[["J","next task"],["K","previous task"],["Esc","clear focus"]]},

  }
  if(state.creating)root.appendChild(newTaskForm());
  // Stats, search, and filters pin together as one sticky header.
  const sticky=el("div","stickyhead"+(state.headCollapsed?" collapsed":""));
  sticky.id="stickyhead";

  sticky.appendChild(searchBox());
  sticky.appendChild(controls());
  const tg=el("div","headtoggle");

  tg.appendChild(tb);sticky.appendChild(tg);

  // Two columns: the task list, and a collapsible hotkey legend beside it.

  body.appendChild(col);
  body.appendChild(helpRail());

  const all=queueList();
  const shown=shownList(all);
  // prune stale selections
  const shownIds=new Set(shown.map(r=>r.id));
  Array.from(state.selected).forEach(id=>{if(!shownIds.has(id))state.selected.delete(id);});
  if(state.selected.size)col.appendChild(bulkBar(shown));

  const meta=el("div","meta");
  const who=state.projects.length?state.projects.join(", "):"all projects";
  const cats=state.categories.length?(" \u00b7 "+state.categories.join(", ")):"";
  const view=statViewActive();
  if(view){
    meta.textContent="Showing all "+all.length+" \u201c"+view.label+"\u201d task"+(all.length===1?"":"s")+" \u00b7 "+who+cats;
  }else{
    const timingLabel=state.timing==="upcoming"&&state.upWindow>0?("upcoming \u00b7 next "+state.upWindow+"d"):state.timing;
    const tail=" open task"+(all.length===1?"":"s")+" \u00b7 "+who+cats+(state.timing!=="all"?" \u00b7 "+timingLabel:"");
    const pinCount=shown.filter(isPinned).length;
    const overriding=pinCount&&state.timing==="upcoming";
    const pinNote=pinCount?(" \u00b7 "+pinCount+" pinned"+(overriding?" (shown despite filter)":"")):"";
    meta.textContent=(state.limit?("Showing "+shown.length+" of "+all.length):("Showing all "+all.length))+tail+pinNote;
  }
  col.appendChild(meta);

  const q=el("div","queue");
  if(!shown.length){
    const total=state.records.length;
    const open=state.records.filter(r=>!isDoneOrCancelled(r)).length;
    let msg;
    if(total===0) msg="No rows are reaching this widget. Check that it's added on the table that actually holds your tasks, and that this widget's access is set to \u201cFull\u201d in the creator panel (the gear \u2192 Access).";
    else if(open===0) msg="All "+total+" task"+(total===1?"":"s")+" here are marked complete or cancelled.";
    else if(statViewActive())msg="No tasks in the \u201c"+statViewActive().label+"\u201d view match your project/category/search filters.";
    else msg="No tasks match the current project/category/timing filters.";
    const emptyEl=Object.assign(el("div","empty"),{textContent:msg});
    q.appendChild(emptyEl);
    if(total>0&&open>0&&filtersActive()){
      const acts=el("div","empty-acts");
      const addAct=(label,fn)=>{const b=el("button","clearlink");b.textContent=label;b.onclick=fn;acts.appendChild(b);};
      // offer to drop the narrowest filter first, then the blunt reset
      if(statViewActive())addAct("Clear the \u201c"+statViewActive().label+"\u201d view",()=>{state.statView=null;persist();render();});
      if(state.search)addAct("Clear search \u201c"+state.search+"\u201d",()=>{state.search="";render();});
      if(state.projects.length)addAct("Clear project filter",()=>{state.projects=[];persist();render();});
      if(state.categories.length)addAct("Clear category filter",()=>{state.categories=[];persist();render();});
      if(state.timing!=="all"&&!statViewActive())addAct("Show all timings",()=>{state.timing="all";state.upWindow=0;persist();render();});
      addAct("Clear everything",clearFilters);
      q.appendChild(acts);
    }
  }
  else shown.forEach((r,i)=>q.appendChild(taskCard(r,i)));
  col.appendChild(q);
  if(state.undo)col.appendChild(undoToast());
  attachStickyWatch();
  syncHeadHeight();
}

function chipFilter(container,labelText,options,selected){

  c.appendChild(row);
  return c;
