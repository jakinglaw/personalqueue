function submitNewTask(){
  const d=state.newDraft||{};
  if(!d.title||!d.title.trim()){alert("Give the task a title.");return;}
  // A task with no due date is valid: it becomes an ongoing task.
  const fields={};
  fields[state.cols.Title]=d.title.trim();
  fields[state.cols.DueDate]=(d.noDue||!d.date)?null:encodeDue(d.date,state.dueIsDateTime?(d.time||"09:00"):null);
  if(state.mapped.Project&&d.project&&d.project.trim())fields[state.cols.Project]=d.project.trim();
  if(state.mapped.Status&&d.status)fields[state.cols.Status]=d.status;
  if(state.mapped.Category&&d.category&&d.category.trim())fields[state.cols.Category]=encodeMulti([d.category.trim()],state.catMulti);
  if(state.mapped.Priority&&d.priority&&PRIORITIES.indexOf(d.priority)>=0)fields[state.cols.Priority]=d.priority;
  if(state.mapped.DaysToComplete&&d.dtc!==""&&d.dtc!==undefined&&d.dtc!==null){const n=Number(d.dtc);if(isFinite(n)&&n>=0)fields[state.cols.DaysToComplete]=n;}
  if(state.mapped.Recurrence){const n=parseInt(d.recur,10);if(n>=1)fields[state.cols.Recurrence]=n;}
  if(state.mapped.Description&&d.description&&d.description.trim())fields[state.cols.Description]=d.description.trim();
  if(state.mapped.AssignedDate)fields[state.cols.AssignedDate]=encodeDateObj(new Date());
  state.creating=false;state.newDraft=null;
  Promise.resolve(createTask(fields)).catch(()=>{});
  render();
}

/* ----- task card (editable, like the calendar's line items) ----- */
function taskCard(r,idx){
  const kind=classify(r);
  const expanded=state.expandedRows.has(r.id);
  const tier=overdueTier(r);
  const pinned=isPinned(r);
  const editing=state.editingRow===r.id;
  const row=el("div","row "+kind+(expanded?" expanded":"")+(tier?" od"+tier:"")+(pinned?" pinned":"")+(isUndated(r)?" ongoing-row":"")+(state.focusIdx===idx?" kfocus":""));
  row.dataset.idx=idx;
  if(!tier)row.style.borderLeftColor=stripeColor(r,kind);

  // bulk-select checkbox
  const cbw=el("div","cbwrap");
  const cb=document.createElement("input");cb.type="checkbox";cb.className="rowcb";
  cb.checked=state.selected.has(r.id);
  cb.onclick=(e)=>{e.stopPropagation();if(cb.checked)state.selected.add(r.id);else state.selected.delete(r.id);render();};
  cbw.appendChild(cb);row.appendChild(cbw);

  row.appendChild(dueCell(r));

  const main=el("div","main");
  const top=el("div","topline");
  const t=timingOf(r);const dd=daysDiff(r);
  if(t==="ongoing"){
    const ob=Object.assign(el("span","badge ongoing"),{textContent:"\u221E Ongoing"});
    ob.title="No due date \u2014 tracked, but never treated as urgent.";
    top.appendChild(ob);
  }
  else if(t==="overdue"){
    const od=overdueDays(r);
    const lbl=["","Overdue","Overdue","Badly overdue","CRITICALLY OVERDUE"][tier];
    top.appendChild(Object.assign(el("span","badge over od"+tier),{textContent:lbl+" \u00b7 "+od+"d"}));
    if(pinned){const pb=Object.assign(el("span","badge pin"),{textContent:"\u{1F4CC} pinned"});
      pb.title="Critically overdue \u2014 always shown, regardless of filters or shuffle.";top.appendChild(pb);}
  }
  else if(t==="today")top.appendChild(Object.assign(el("span","badge today"),{textContent:"Due today"}));
  else top.appendChild(Object.assign(el("span","badge up"),{textContent:"In "+dd+" day"+(dd===1?"":"s")}));
  if(isAtRisk(r)){const sl=slackDays(r);
    top.appendChild(Object.assign(el("span","badge risk"),{textContent:"\u26A0 At risk"+(sl<0?(" \u00b7 "+Math.abs(sl)+"d short"):"")}));}
  top.appendChild(Object.assign(el("span","title"+(kind==="complete"?" done":"")),{textContent:(kind==="complete"?"\u2713 ":"")+(r.title||"(untitled)")}));
  main.appendChild(top);

  if(state.mapped.AssignedDate&&r.assignedDate)main.appendChild(Object.assign(el("div","asgdate"),{textContent:"Assigned "+fmtShortDate(r.assignedDate)}));

  // Tags are read-only now; all editing goes through the single Edit panel.
  const tags=el("div","tags");
  if(state.mapped.Project){
    recProj(r).forEach(p=>{if(p===NO_PROJECT)return;tags.appendChild(Object.assign(el("span","tag proj"),{textContent:p}));});
  }
  if(state.mapped.Category){
    recCats(r).forEach(c=>{if(c===NO_CAT)return;const x=el("span","tag cat");x.style.background=catColor(c);x.textContent=c;tags.appendChild(x);});
  }
  if(state.mapped.Priority){
    const p=normPriority(r.priority);
    if(p)tags.appendChild(Object.assign(el("span","tag pri pri-"+p.toLowerCase()),{textContent:"\u25B2 "+p}));
  }
  if(state.mapped.Recurrence){
    const days=parseRecurDays(r.recurrence);
    if(days)tags.appendChild(Object.assign(el("span","tag recur"),{textContent:"\u21BB "+fmtRecurDays(days)}));
  }
  if(tags.children.length)main.appendChild(tags);

  const hasDesc=r.description!==null&&r.description!==undefined&&String(r.description).trim()!=="";
  if(state.mapped.Description&&hasDesc&&!editing){
    const d=el("div","desc"+(expanded?" full":""));d.textContent=String(r.description);main.appendChild(d);
    main.appendChild(Object.assign(el("div","descmore"),{textContent:expanded?"Show less \u25B4":"Show more \u25BE"}));
  }

  // The one editor.
  if(editing)main.appendChild(editPanel(r));

  row.appendChild(main);
  if(state.mapped.Status)row.appendChild(statusControl(r,kind));
  row.appendChild(editBtn(r));
  row.appendChild(dupBtn(r));
  row.appendChild(snoozeControl(r));
  row.appendChild(deleteBtn(r));

  row.onclick=()=>{if(!editing){if(expanded)state.expandedRows.delete(r.id);else state.expandedRows.add(r.id);render();}selectInGrist(r.id);};
  return row;
}
function editBtn(r){
  const b=el("button","editbtn"+(state.editingRow===r.id?" on":""));
  b.textContent="\u270E";
  b.title="Edit this task";
  b.setAttribute("aria-label","Edit task: "+(r.title||"untitled"));
  b.onclick=(e)=>{e.stopPropagation();
    if(state.editingRow===r.id){state.editingRow=null;}
    else{clearTransient();state.editingRow=r.id;}
    render();};
  return b;
}

/* ----- editors (ported from the calendar) ----- */
/* ---- Unified edit panel: every field in one place, one Save. ----
   Replaces the old per-field pencil chips. Writes only fields that changed. */
function editPanel(r){
  const ed=el("div","editpanel");
  ["click","mousedown"].forEach(ev=>ed.addEventListener(ev,e=>e.stopPropagation()));

  // draft holds the pending values; nothing is written until Save
  const d={
    title: r.title||"",
    date:  r.due?(pad4(r.due.y)+"-"+pad2(r.due.mo+1)+"-"+pad2(r.due.d)):"",
    time:  (r.due&&r.due.minuteOfDay>=0)?(pad2(Math.floor(r.due.minuteOfDay/60))+":"+pad2(r.due.minuteOfDay%60)):"09:00",
    noDue: !r.due,
    status: (r.status===null||r.status===undefined)?"":String(r.status),
    project: recProj(r).find(v=>v!==NO_PROJECT)||"",
    cats: recCats(r).filter(c=>c!==NO_CAT),
    priority: normPriority(r.priority)||"",
    recur: (parseRecurDays(r.recurrence)||""),
    dtc: (daysToComplete(r)===null?"":daysToComplete(r)),
    description: (r.description===null||r.description===undefined)?"":String(r.description),
  };

  const row=(label)=>{const x=el("div","ep-row");x.appendChild(Object.assign(el("label"),{textContent:label}));return x;};

  // Title
  {const x=row("Title");
   const i=document.createElement("input");i.type="text";i.className="ep-in";i.value=d.title;i.placeholder="Task title\u2026";
   i.oninput=()=>d.title=i.value;x.appendChild(i);ed.appendChild(x);
   requestAnimationFrame(()=>i.focus());}

  // Due date (+ optional time) + no-due-date
  {const x=row("Due");
   const di=document.createElement("input");di.type="date";di.className="ep-in ep-sm";di.value=d.date;di.disabled=d.noDue;
   di.oninput=()=>d.date=di.value;x.appendChild(di);
   let ti=null;
   if(state.dueIsDateTime){ti=document.createElement("input");ti.type="time";ti.className="ep-in ep-sm";ti.value=d.time;ti.disabled=d.noDue;
     ti.oninput=()=>d.time=ti.value;x.appendChild(ti);}
   const sc=el("div","ep-quick");
   [["+1d",1],["+7d",7],["+30d",30]].forEach(([lab,n])=>{const b=el("button");b.type="button";b.textContent=lab;
     b.onclick=()=>{if(d.noDue)return;const base=d.date?d.date.split("-").map(Number):null;
       const dt=base?new Date(base[0],base[1]-1,base[2]):new Date();dt.setDate(dt.getDate()+n);
       d.date=iso(dt);di.value=d.date;};sc.appendChild(b);});
   x.appendChild(sc);
   const lab=document.createElement("label");lab.className="ep-check";
   const cb=document.createElement("input");cb.type="checkbox";cb.checked=d.noDue;
   cb.onchange=()=>{d.noDue=cb.checked;di.disabled=cb.checked;if(ti)ti.disabled=cb.checked;};
   lab.append(cb,document.createTextNode(" No due date (ongoing)"));
   x.appendChild(lab);
   ed.appendChild(x);}

  // Status
  if(state.mapped.Status){const x=row("Status");
   const s=document.createElement("select");s.className="ep-in ep-sm";
   s.appendChild(opt("","\u2014 none \u2014",!d.status));
   statusOptions().forEach(v=>s.appendChild(opt(v,v,v===d.status)));
   s.onchange=()=>d.status=s.value;x.appendChild(s);ed.appendChild(x);}

  // Project
  if(state.mapped.Project){const x=row("Project");
   const ADD="__add__";
   const s=document.createElement("select");s.className="ep-in";
   s.appendChild(opt("","\u2014 none \u2014",!d.project));
   knownProjects().forEach(p=>s.appendChild(opt(p,p,p===d.project)));
   s.appendChild(opt(ADD,"\uFF0B Add new project\u2026",false));
   const ai=document.createElement("input");ai.type="text";ai.className="ep-in ep-add";ai.placeholder="New project name\u2026";ai.style.display="none";
   ai.oninput=()=>d.project=ai.value.trim();
   s.onchange=()=>{if(s.value===ADD){ai.style.display="";ai.focus();d.project=ai.value.trim();}
     else{ai.style.display="none";d.project=s.value;}};
   x.appendChild(s);x.appendChild(ai);ed.appendChild(x);}

  // Category (multi if the column is a ChoiceList)
  if(state.mapped.Category){const x=row("Category");
   const wrap=el("div","ep-chips");
   const sel=new Set(d.cats);
   knownCategories().forEach(c=>{
     const chip=el("button","pchip"+(sel.has(c)?" sel":""));chip.type="button";chip.textContent=c;
     chip.onclick=()=>{
       if(sel.has(c))sel.delete(c);
       else{if(!state.catMulti)sel.clear();sel.add(c);}
       d.cats=Array.from(sel);
       wrap.querySelectorAll(".pchip").forEach(n=>n.classList.toggle("sel",sel.has(n.textContent)));
     };
     wrap.appendChild(chip);
   });
   x.appendChild(wrap);ed.appendChild(x);}

  // Priority (fixed three)
  if(state.mapped.Priority){const x=row("Priority");
   const wrap=el("div","ep-chips");
   PRIORITIES.forEach(p=>{
     const chip=el("button","pchip pri-"+p.toLowerCase()+(d.priority===p?" sel":""));chip.type="button";chip.textContent=p;
     chip.onclick=()=>{d.priority=(d.priority===p)?"":p;
       wrap.querySelectorAll(".pchip").forEach(n=>n.classList.toggle("sel",n.textContent===d.priority));};
     wrap.appendChild(chip);
   });
   x.appendChild(wrap);ed.appendChild(x);}

  // Days to complete
  if(state.mapped.DaysToComplete){const x=row("Est. work");
   const i=document.createElement("input");i.type="number";i.min="0";i.step="0.5";i.className="ep-in ep-sm";i.value=d.dtc;i.placeholder="days";
   i.oninput=()=>d.dtc=i.value;x.appendChild(i);
   x.appendChild(Object.assign(el("span","ep-hint"),{textContent:"days of work"}));ed.appendChild(x);}

  // Recurrence
  if(state.mapped.Recurrence){const x=row("Repeat");
   const i=document.createElement("input");i.type="number";i.min="1";i.className="ep-in ep-sm";i.value=d.recur;i.placeholder="days";
   i.oninput=()=>d.recur=i.value;x.appendChild(i);
   x.appendChild(Object.assign(el("span","ep-hint"),{textContent:"days (blank = no repeat)"}));ed.appendChild(x);}

  // Description
  if(state.mapped.Description){const x=row("Note");
   const t=document.createElement("textarea");t.className="ep-in ep-ta";t.value=d.description;t.placeholder="Add a note\u2026";
   t.oninput=()=>d.description=t.value;x.appendChild(t);ed.appendChild(x);}

  // Actions
  const acts=el("div","ep-actions");
  const save=el("button","fe-save");save.type="button";save.textContent="Save";
  save.onclick=()=>{
    state.editingRow=null;
    const restore=undoableFieldChange([r.id]);
    let changed=false;

    // Title
    const nt=d.title.trim();
    if(nt&&nt!==(r.title||"")){setTitle(r.id,nt);changed=true;}

    // Due date — compare on components, not the raw timestamp, so a DateTime
    // column doesn't register a phantom change every time the panel opens.
    const hadDue=!!r.due;
    if(d.noDue||!d.date){
      if(hadDue){setDue(r.id,null);changed=true;}
    }else{
      const curDate=hadDue?(pad4(r.due.y)+"-"+pad2(r.due.mo+1)+"-"+pad2(r.due.d)):"";
      const curTime=(hadDue&&r.due.minuteOfDay>=0)?(pad2(Math.floor(r.due.minuteOfDay/60))+":"+pad2(r.due.minuteOfDay%60)):"";
      const newTime=state.dueIsDateTime?(d.time||"09:00"):"";
      if(d.date!==curDate||(state.dueIsDateTime&&newTime!==curTime)){
        setDue(r.id,encodeDue(d.date,state.dueIsDateTime?(d.time||"09:00"):null));changed=true;
      }
    }

    // Status
    if(state.mapped.Status){
      const cur=(r.status===null||r.status===undefined)?"":String(r.status);
      if(d.status!==cur){setStatus(r.id,d.status||null);changed=true;}
    }
    // Project
    if(state.mapped.Project){
      const cur=recProj(r).find(v=>v!==NO_PROJECT)||"";
      if(d.project!==cur){setProject(r.id,d.project?[d.project]:[]);changed=true;}
    }
    // Category
    if(state.mapped.Category){
      const cur=recCats(r).filter(c=>c!==NO_CAT);
      if(cur.slice().sort().join("|")!==d.cats.slice().sort().join("|")){setCategory(r.id,d.cats);changed=true;}
    }
    // Priority
    if(state.mapped.Priority){
      const cur=normPriority(r.priority)||"";
      if(d.priority!==cur){setPriority(r.id,d.priority||null);changed=true;}
    }
    // Days to complete
    if(state.mapped.DaysToComplete){
      const cur=daysToComplete(r);
      const nv=(d.dtc===""||d.dtc===null)?null:Number(d.dtc);
      if((nv===null)!==(cur===null)||(nv!==null&&nv!==cur)){setDaysToComplete(r.id,nv);changed=true;}
    }
    // Recurrence
    if(state.mapped.Recurrence){
      const cur=parseRecurDays(r.recurrence);
      const nv=(d.recur===""||d.recur===null)?null:parseInt(d.recur,10);
      if((nv===null)!==(cur===null)||(nv!==null&&nv!==cur)){setRecurrence(r.id,(nv&&nv>=1)?nv:null);changed=true;}
    }
    // Description
    if(state.mapped.Description){
      const cur=(r.description===null||r.description===undefined)?"":String(r.description);
      if(d.description!==cur){setDescription(r.id,d.description);changed=true;}
    }

    if(changed)pushUndo("Edited \u201c"+(nt||r.title||"task")+"\u201d",restore);
    render();
  };
  const cancel=el("button","fe-cancel");cancel.type="button";cancel.textContent="Cancel";
  cancel.onclick=()=>{state.editingRow=null;render();};
  acts.append(save,cancel);ed.appendChild(acts);
  return ed;
}

function clearTransient(){state.openDateRow=null;state.openStatusRow=null;state.openSnoozeRow=null;state.openDtcRow=null;state.editingRow=null;}
function openInlineEditor(which,id){clearTransient();state.editingRow=id;render();}

async function deleteTask(rowId,title){
  const label=title&&String(title).trim()?"\u201c"+String(title).trim()+"\u201d":"this task";
  if(!confirm("Delete "+label+"?"))return;
  const r=state.records.find(x=>x.id===rowId);
  const snap=r?[{fields:rawFieldsOf(r)}]:[];
  try{await grist.selectedTable.destroy(rowId);}
  catch(e){try{const tid=await grist.selectedTable.getTableId();await grist.docApi.applyUserActions([["RemoveRecord",tid,rowId]]);}
  catch(e2){console.error(e2);alert("Could not delete the task. The widget needs full (read & write) access.");return;}}
  pushUndo("Deleted "+label,()=>recreateRecords(snap));
}
function snoozeControl(r){
  const w=el("div","snoozewrap");
  const b=el("button","snoozebtn");b.textContent="\u23F1";b.title="Snooze \u2014 push this out without touching the real deadline";
  b.setAttribute("aria-label","Snooze task: "+(r.title||"untitled"));
  b.onclick=(e)=>{e.stopPropagation();const was=state.openSnoozeRow===r.id;clearTransient();state.openSnoozeRow=was?null:r.id;render();};
  w.appendChild(b);
  if(state.openSnoozeRow===r.id){
    const m=el("div","snoozemenu");m.onclick=e=>e.stopPropagation();
    const add=(label,days)=>{const it=el("button","statusitem");it.textContent=label;
      it.onclick=()=>{state.openSnoozeRow=null;snoozeTask(r,days);render();};m.appendChild(it);};
    add("Tomorrow",1);
    add("In 3 days",3);
    add("Next week",7);
    add("Next Monday",nextMondayDays());
    add("In 2 weeks",14);
    w.appendChild(m);
  }
  return w;
}
function dtcEditor(r){
  const ed=el("div","dateeditor");["click","mousedown"].forEach(ev=>ed.addEventListener(ev,e=>e.stopPropagation()));
  ed.appendChild(Object.assign(el("div","dtc-hd"),{textContent:"Days of work needed"}));
  const inp=document.createElement("input");inp.type="number";inp.min="0";inp.max="365";inp.step="0.5";
  const cur=daysToComplete(r);inp.value=(cur===null)?"":cur;
  ed.appendChild(inp);
  const qs=el("div","de-shortcuts");
  [0.5,1,2,3,5,10].forEach(n=>{const b=el("button");b.textContent=n+"d";b.onclick=()=>{inp.value=n;};qs.appendChild(b);});
  ed.appendChild(qs);
  const acts=el("div","de-actions");
  const save=el("button","de-save");save.textContent="Save";
  save.onclick=()=>{state.openDtcRow=null;const v=inp.value===""?null:Number(inp.value);setDaysToComplete(r.id,(v!==null&&isFinite(v)&&v>=0)?v:null);render();};
  const clr=el("button","de-cancel");clr.textContent="Clear";clr.onclick=()=>{state.openDtcRow=null;setDaysToComplete(r.id,null);render();};
  const cancel=el("button","de-cancel");cancel.textContent="Cancel";cancel.onclick=()=>{state.openDtcRow=null;render();};
  acts.append(save,clr,cancel);ed.appendChild(acts);
  return ed;
}
function duplicateTask(r){
  const f=rawFieldsOf(r);
  if(state.cols.Title)f[state.cols.Title]=(r.title||"Untitled")+" (copy)";
  if(state.cols.Status)delete f[state.cols.Status];              // new copy starts open
  if(state.cols.CompletedDate)delete f[state.cols.CompletedDate];
  if(state.cols.AssignedDate)f[state.cols.AssignedDate]=encodeDateObj(new Date());
  Promise.resolve(createTask(f)).catch(()=>{});
}
function dupBtn(r){
  const b=el("button","dupbtn");b.title="Duplicate this task";b.textContent="\u29C9";
  b.setAttribute("aria-label","Duplicate task: "+(r.title||"untitled"));
  b.onclick=(e)=>{e.stopPropagation();duplicateTask(r);};
  return b;
}
function deleteBtn(r){
  const b=el("button","delbtn");b.title="Delete this task";b.textContent="\u{1F5D1}";
  b.setAttribute("aria-label","Delete task: "+(r.title||"untitled"));
  b.onclick=(e)=>{e.stopPropagation();deleteTask(r.id,r.title);};
  return b;
}

function dueCell(r){
  const wrap=el("div","duewrap");
  const due=r.due;
  const label=due?(due.timeStr?due.timeStr:fmtShortDate(due)):"No date";
  const btn=el("button","time editable"+(due?"":" nodate"));
  btn.title=due?"Click to change or clear the due date":"No due date \u2014 click to set one";
  btn.innerHTML=esc(label)+' <span class="pen">\u270E</span>';
  btn.onclick=(e)=>{e.stopPropagation();const was=state.openDateRow===r.id;clearTransient();state.openDateRow=was?null:r.id;render();};
  wrap.appendChild(btn);

  // --- days to complete (editable) + runway readout ---
  if(state.mapped.DaysToComplete){
    const need=daysToComplete(r);
    const risk=isAtRisk(r);
    const dtc=el("button","dtc"+(risk?" atrisk":"")+(need===null?" unset":""));
    dtc.title="Estimated days of work needed \u2014 click to change";
    dtc.textContent=(need===null)?"\uFF0B est." : ("\u{1F6E0} "+need+"d work");
    dtc.onclick=(e)=>{e.stopPropagation();const was=state.openDtcRow===r.id;clearTransient();state.openDtcRow=was?null:r.id;render();};
    wrap.appendChild(dtc);

    if(need!==null&&hasRealDeadline(r)){
      const s=slackDays(r);
      const line=el("div","runway");
      if(timingOf(r)==="overdue"){line.className="runway over";line.textContent="overdue";}
      else if(s<0){line.className="runway short";line.textContent=Math.abs(s)+"d short";}
      else if(s===0){line.className="runway tight";line.textContent="no slack";}
      else{line.className="runway ok";line.textContent=s+"d slack";}
      wrap.appendChild(line);
    }
    if(state.openDtcRow===r.id)wrap.appendChild(dtcEditor(r));
  }

  if(state.openDateRow===r.id)wrap.appendChild(dateEditor(r));
  return wrap;
}
function shiftDateInput(input,n){const b=input.value?input.value.split("-").map(Number):null;const d=b?new Date(b[0],b[1]-1,b[2]):new Date();d.setDate(d.getDate()+n);input.value=iso(d);}
function dateEditor(r){
  const ed=el("div","dateeditor");["click","mousedown"].forEach(ev=>ed.addEventListener(ev,e=>e.stopPropagation()));
  const due=r.due||todayDue();
  const dIn=document.createElement("input");dIn.type="date";
  dIn.value=r.due?(pad4(due.y)+"-"+pad2(due.mo+1)+"-"+pad2(due.d)):"";   // blank when undated
  ed.appendChild(dIn);
  let tIn=null;
  if(state.dueIsDateTime){tIn=document.createElement("input");tIn.type="time";const mod=due.minuteOfDay>=0?due.minuteOfDay:540;tIn.value=pad2(Math.floor(mod/60))+":"+pad2(mod%60);ed.appendChild(tIn);}
  const sc=el("div","de-shortcuts");
  [["+1d",1,"Next day"],["+7d",7,"In 7 days"],["+14d",14,"In 14 days"],["+30d",30,"In 30 days"]].forEach(o=>{const b=el("button");b.textContent=o[0];b.title=o[2];b.onclick=()=>shiftDateInput(dIn,o[1]);sc.appendChild(b);});
  ed.appendChild(sc);
  // Explicit "no due date" — an ongoing task, tracked but never urgent.
  const none=el("button","de-none"+(r.due?"":" on"));
  none.textContent="\u221E No due date \u2014 ongoing";
  none.title="Track this without a deadline. It will never be flagged overdue or pinned.";
  none.onclick=()=>{state.openDateRow=null;setDue(r.id,null);render();};
  ed.appendChild(none);
  const acts=el("div","de-actions");
  const save=el("button","de-save");save.textContent="Save";
  save.onclick=()=>{
    state.openDateRow=null;
    // A blank date field now means "no due date" rather than a silent no-op.
    if(!dIn.value)setDue(r.id,null);
    else setDue(r.id,encodeDue(dIn.value,tIn?tIn.value:null));
    render();
  };
  const cancel=el("button","de-cancel");cancel.textContent="Cancel";cancel.onclick=()=>{state.openDateRow=null;render();};
  acts.append(save,cancel);ed.appendChild(acts);return ed;
}

function statusOptions(){
  if(state.choiceStatus.length)return state.choiceStatus;
  const s=new Set();state.records.forEach(r=>{const v=r.status;if(v!==null&&v!==undefined&&String(v).trim()!=="")s.add(String(v));});return Array.from(s).sort((a,b)=>a.localeCompare(b));
}
function statusControl(r,kind){
  const wrap=el("div","statuswrap");
  const has=r.status!==null&&r.status!==undefined&&String(r.status).trim()!=="";
  const pill=el("button","statuspill"+(kind==="complete"||kind==="ready"?" is-complete":""));
  pill.innerHTML=esc(has?String(r.status):"Set status")+' <span class="pcaret">\u25BE</span>';
  pill.onclick=(e)=>{e.stopPropagation();const was=state.openStatusRow===r.id;clearTransient();state.openStatusRow=was?null:r.id;render();};
  wrap.appendChild(pill);
  if(state.openStatusRow===r.id){
    const menu=el("div","statusmenu");menu.onclick=e=>e.stopPropagation();
    const opts=statusOptions();
    if(!opts.length)menu.appendChild(Object.assign(el("div","empty"),{textContent:"No status values yet."}));
    opts.forEach(s=>{const it=el("button","statusitem"+(String(r.status)===s?" current":""));it.textContent=s;
      it.onclick=()=>{state.openStatusRow=null;const restore=undoableFieldChange([r.id]);setStatus(r.id,s);
        pushUndo("Set \u201c"+(r.title||"task")+"\u201d to "+s,restore);};menu.appendChild(it);});
    if(has){const clr=el("button","statusitem clear");clr.textContent="Clear status";clr.onclick=()=>{state.openStatusRow=null;setStatus(r.id,null);render();};menu.appendChild(clr);}
    wrap.appendChild(menu);
  }
  return wrap;
}

function fieldEditShell(){const ed=el("div","fieldedit");["click","mousedown"].forEach(ev=>ed.addEventListener(ev,e=>e.stopPropagation()));return ed;}
function knownProjects(){
  if(state.choiceProject.length)return state.choiceProject;
  return uniqSorted([].concat.apply([],state.records.map(recProj))).filter(v=>v!==NO_PROJECT);
}
function knownCategories(){
  if(state.choiceCategory.length)return state.choiceCategory;
  return uniqSorted([].concat.apply([],state.records.map(recCats))).filter(c=>c!==NO_CAT);
}
function feActions(onSave,onCancel){const a=el("div","fe-actions");const s=el("button","fe-save");s.textContent="Save";s.onclick=onSave;const c=el("button","fe-cancel");c.textContent="Cancel";c.onclick=onCancel;a.append(s,c);return a;}

document.addEventListener("click",()=>{let ch=false;if(state.openStatusRow!==null){state.openStatusRow=null;ch=true;}if(state.openDateRow!==null){state.openDateRow=null;ch=true;}if(ch)render();});

/* adjust desc clamp affordance */
function adjustClamps(){document.querySelectorAll(".row").forEach(row=>{const d=row.querySelector(".desc:not(.full)");if(d&&d.scrollHeight-d.clientHeight>2)row.classList.add("truncated");});}
const _origRender=render;
render=function(){_origRender();adjustClamps();};

/* ===================== Init ===================== */
